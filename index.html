<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode del Mundial Familiar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a472a;--green-light:#2d6a4f;--gold:#f0b429;
  --bg:#f8f9fa;--card:#ffffff;--border:#e2e8f0;--text:#1a202c;--muted:#718096;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111827;--card:#1f2937;--border:#374151;--text:#f9fafb;--muted:#9ca3af}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:1rem}
.header{text-align:center;padding:1.5rem 0 1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:var(--gold);padding:6px 20px;border-radius:999px;font-size:13px;font-weight:600;margin-bottom:.75rem}
.header h1{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.header p{font-size:14px;color:var(--muted);margin-top:4px}
.nav{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:.75rem}
.nav-btn{padding:7px 16px;border-radius:var(--radius-sm);border:none;background:transparent;font-size:13px;cursor:pointer;color:var(--muted);font-family:inherit;font-weight:500;transition:all .15s}
.nav-btn:hover{color:var(--text);background:var(--border)}
.nav-btn.active{background:var(--green);color:var(--gold)}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:15px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:500}
.badge-gray{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.badge-gold{background:var(--gold);color:#5a3e00}
.badge-red{background:#fed7d7;color:#9b2c2c}
.phase-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:1.25rem;padding-bottom:2px;scrollbar-width:thin}
.phase-tab{flex-shrink:0;padding:7px 16px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s;font-family:inherit;font-weight:500}
.phase-tab.active{background:var(--green);color:var(--gold);border-color:var(--green);font-weight:600}
.phase-tab.locked{opacity:.6}
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.player-card{padding:1.1rem 1rem;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .15s}
.player-card:hover{border-color:var(--green);background:var(--card);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.player-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#f0b429}
.player-card-name{font-size:14px;font-weight:600;color:var(--text)}
.player-card-pts{font-size:12px;color:var(--muted);margin-top:3px}
.player-add-card{border-style:dashed;background:transparent}
.player-add-card:hover{border-color:var(--green)}
.player-add-card .player-avatar{background:var(--border)}
.match{display:grid;grid-template-columns:1fr 100px 1fr;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid var(--border)}
.match:last-child{border-bottom:none}
.team{display:flex;align-items:center;gap:8px}
.team.right{flex-direction:row-reverse;text-align:right}
.team-flag{font-size:22px;flex-shrink:0;line-height:1}
.team-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.score-box{display:flex;align-items:center;justify-content:center;gap:6px;flex-direction:column}
.score-inputs{display:flex;align-items:center;gap:5px}
.score-input{width:34px;height:34px;text-align:center;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-weight:600;background:var(--bg);color:var(--text);-moz-appearance:textfield}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none}
.score-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(26,71,42,.15)}
.score-input:disabled{opacity:.45;cursor:not-allowed;background:var(--border)}
.score-sep{font-size:18px;color:var(--muted);font-weight:700}
.result-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.result-pill.exact{background:#c6f6d5;color:#276749}
.result-pill.partial{background:#fef3c7;color:#92400e}
.result-pill.miss{background:#fed7d7;color:#9b2c2c}
.actual-score{font-size:11px;color:var(--muted);font-weight:500}
.group-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.group-label:not(:first-child){margin-top:8px}
.lb-header{display:grid;grid-template-columns:36px 1fr 50px 50px 50px;gap:8px;padding:4px 14px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.lb-row{display:grid;grid-template-columns:36px 1fr 50px 50px 50px;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:4px}
.lb-row.pos1{background:#f0b429;color:#3a2600}
.lb-row.pos2{background:#e8edf2;color:#2d3748}
.lb-row.pos3{background:#fbd38d;color:#7b341e}
.lb-row.other{background:var(--bg)}
.lb-pos{font-weight:700;text-align:center}
.lb-name{font-weight:600;display:flex;align-items:center;gap:8px}
.lb-mini-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#f0b429;flex-shrink:0}
.lb-pts{text-align:center;font-weight:700;font-size:16px}
.lb-detail{text-align:center;font-size:13px}
.scoring-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.scoring-card{padding:12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center}
.scoring-card .val{font-size:22px;font-weight:700;color:var(--green)}
.scoring-card .lbl{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.admin-match{display:grid;grid-template-columns:1fr 50px 50px 1fr;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.admin-match:last-child{border-bottom:none}
.admin-input{width:48px;height:32px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:15px;font-weight:600;background:var(--bg);color:var(--text);-moz-appearance:textfield}
.admin-input::-webkit-outer-spin-button,.admin-input::-webkit-inner-spin-button{-webkit-appearance:none}
.admin-input:focus{outline:none;border-color:var(--green)}
.admin-team{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-team.right{text-align:right}
.knockout-edit{display:flex;flex-direction:column;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.knockout-edit:last-child{border-bottom:none}
.knockout-row{display:grid;grid-template-columns:1fr 42px 42px 1fr;align-items:center;gap:8px}
.btn{padding:9px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.btn:hover{border-color:var(--green);background:var(--bg)}
.btn.primary{background:var(--green);color:var(--gold);border-color:var(--green)}
.btn.primary:hover{background:var(--green-light)}
.btn.danger{background:#fed7d7;color:#9b2c2c;border-color:#fca5a5}
.btn.sm{padding:5px 12px;font-size:12px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem}
.input{width:100%;padding:9px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;transition:border .15s}
.input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(26,71,42,.12)}
.label{font-size:13px;color:var(--muted);margin-bottom:5px;display:block;font-weight:500}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;cursor:pointer;color:var(--muted);font-size:14px;font-weight:500;width:fit-content;padding:6px 10px;border-radius:var(--radius-sm);transition:all .15s}
.back-row:hover{color:var(--text);background:var(--border)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--card);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:380px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:1rem}
.empty{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:14px}
.tip{font-size:12px;color:var(--muted);margin-top:.5rem;line-height:1.5}
.player-header{display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.player-header-name{font-size:20px;font-weight:700}
.player-header-sub{font-size:13px;color:var(--muted);margin-top:2px}
.phase-locked-msg{padding:10px 14px;background:#fef3c7;border:1px solid #f6d860;border-radius:var(--radius-sm);font-size:13px;color:#92400e;margin-bottom:1rem}
/* SYNC STATUS */
.sync-bar{position:fixed;bottom:1rem;right:1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);transition:all .3s;z-index:100}
.sync-bar.saving{color:#92400e;border-color:#f6d860;background:#fef3c7}
.sync-bar.error{color:#9b2c2c;border-color:#fca5a5;background:#fed7d7}
.sync-bar.ok{color:#276749;border-color:#9ae6b4;background:#c6f6d5}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
@media(max-width:600px){
  .match{grid-template-columns:1fr 90px 1fr}
  .team-name{font-size:12px}
  .team-flag{font-size:18px}
  .players-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .lb-row,.lb-header{grid-template-columns:28px 1fr 42px 42px 42px}
}
</style>
</head>
<body>
<div class="app" id="root"></div>
<div class="sync-bar" id="sync-bar"><span class="sync-dot"></span><span id="sync-msg">Conectado</span></div>

<script>
// ============================================================
//  CONFIG — JSONBin
// ============================================================
const BIN_ID   = '6a275cc9da38895dfe9d04c2';
const MASTER_KEY = '$2a$10$BFCDKms/rPAn3zcFFbTxoe31tARA4uHY6iU2i6tcqIQwCmxRFzOpe';
const API_BASE = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ============================================================
//  DATA — grupos del mundial
// ============================================================
const GROUPS={
  'Grupo A':['Qatar 🇶🇦','Ecuador 🇪🇨','Senegal 🇸🇳','Países Bajos 🇳🇱'],
  'Grupo B':['Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿','Irán 🇮🇷','Estados Unidos 🇺🇸','Gales 🏴󠁧󠁢󠁷󠁬󠁳󠁿'],
  'Grupo C':['Argentina 🇦🇷','Arabia Saudita 🇸🇦','México 🇲🇽','Polonia 🇵🇱'],
  'Grupo D':['Francia 🇫🇷','Australia 🇦🇺','Dinamarca 🇩🇰','Túnez 🇹🇳'],
  'Grupo E':['España 🇪🇸','Costa Rica 🇨🇷','Alemania 🇩🇪','Japón 🇯🇵'],
  'Grupo F':['Bélgica 🇧🇪','Canadá 🇨🇦','Marruecos 🇲🇦','Croacia 🇭🇷'],
  'Grupo G':['Brasil 🇧🇷','Serbia 🇷🇸','Suiza 🇨🇭','Camerún 🇨🇲'],
  'Grupo H':['Portugal 🇵🇹','Ghana 🇬🇭','Uruguay 🇺🇾','Corea del Sur 🇰🇷'],
};
function makeGroupMatches(){
  const m=[];let id=1;
  for(const[g,teams]of Object.entries(GROUPS)){
    for(let i=0;i<teams.length;i++)for(let j=i+1;j<teams.length;j++)
      m.push({id:'g'+id++,group:g,home:teams[i],away:teams[j],result:null});
  }
  return m;
}
function makeKO(phase,n){
  const m=[];
  for(let i=1;i<=n;i++) m.push({id:phase+'_'+i,home:'Por definir',away:'Por definir',result:null});
  return m;
}
const DEFAULT_PHASES=[
  {id:'grupos',label:'Fase de grupos',locked:false,hasGroups:true,matches:makeGroupMatches()},
  {id:'octavos',label:'Octavos de final',locked:true,hasGroups:false,matches:makeKO('oct',8)},
  {id:'cuartos',label:'Cuartos de final',locked:true,hasGroups:false,matches:makeKO('qtr',4)},
  {id:'semis',label:'Semifinales',locked:true,hasGroups:false,matches:makeKO('sf',2)},
  {id:'final',label:'Final',locked:true,hasGroups:false,matches:makeKO('fin',1)},
];

// ============================================================
//  STATE & SYNC
// ============================================================
let state = {phases: JSON.parse(JSON.stringify(DEFAULT_PHASES)), players: [], adminPin: '1234'};
let saveTimer = null;
let lastEtag = null;
let pollTimer = null;

function syncStatus(type, msg){
  const bar = document.getElementById('sync-bar');
  const txt = document.getElementById('sync-msg');
  if(!bar) return;
  bar.className = 'sync-bar ' + type;
  txt.textContent = msg;
  if(type === 'ok') setTimeout(()=>{ bar.className='sync-bar'; txt.textContent='Conectado'; }, 2000);
}

async function loadFromCloud(){
  try{
    const resp = await fetch(API_BASE + '/latest', {
      headers:{'X-Master-Key': MASTER_KEY}
    });
    const data = await resp.json();
    if(data.record){
      const rec = data.record;
      // Merge: preserve phase structure, update with cloud data
      if(rec.players) state.players = rec.players;
      if(rec.adminPin) state.adminPin = rec.adminPin;
      if(rec.phases && rec.phases.length > 0) state.phases = rec.phases;
      lastEtag = resp.headers.get('ETag');
      return true;
    }
  }catch(e){ syncStatus('error','Sin conexión'); }
  return false;
}

async function saveToCloud(){
  syncStatus('saving','Guardando...');
  try{
    const resp = await fetch(API_BASE, {
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'X-Master-Key': MASTER_KEY
      },
      body: JSON.stringify(state)
    });
    if(resp.ok){ syncStatus('ok','Guardado ✓'); }
    else{ syncStatus('error','Error al guardar'); }
  }catch(e){ syncStatus('error','Sin conexión'); }
}

function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToCloud, 800);
}

// Poll for changes every 10s
function startPolling(){
  pollTimer = setInterval(async ()=>{
    const updated = await loadFromCloud();
    if(updated) render();
  }, 10000);
}

// ============================================================
//  HELPERS
// ============================================================
function getPhase(id){return state.phases.find(p=>p.id===id);}
function getAllResults(){
  const r={};
  for(const ph of state.phases)for(const m of ph.matches)if(m.result)r[m.id]=m.result;
  return r;
}
function calcPts(preds,results){
  let pts=0,exact=0,part=0;
  for(const[mid,actual]of Object.entries(results)){
    if(!actual||actual.home===null||actual.away===null)continue;
    const p=preds[mid];
    if(!p||p.home===null||p.away===null)continue;
    if(p.home===actual.home&&p.away===actual.away){pts+=3;exact++;}
    else if(Math.sign(p.home-p.away)===Math.sign(actual.home-actual.away)){pts+=1;part++;}
  }
  return{pts,exact,part};
}
function getLeaderboard(){
  const results=getAllResults();
  return state.players.map(p=>{
    const{pts,exact,part}=calcPts(p.predictions||{},results);
    return{...p,pts,exact,part};
  }).sort((a,b)=>b.pts-a.pts||(b.exact-a.exact)||(b.part-a.part));
}
const AVATAR_COLORS=['#1a472a','#2c5f8a','#7b2d8b','#9b2c2c','#c05621','#276749','#2c5282','#b7791f','#2b6cb0','#2d6a4f'];
function avatarColor(name){let h=0;for(const c of name)h+=c.charCodeAt(0);return AVATAR_COLORS[h%AVATAR_COLORS.length];}
function initials(name){return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function flag(team){const m=team.match(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u);return m?m[0]:'🏳️';}
function cleanName(team){return team.replace(/\s*(\p{Emoji_Presentation}|\p{Extended_Pictographic})+\s*/gu,' ').trim();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ============================================================
//  VIEW STATE
// ============================================================
let view='home';
let currentPlayer=null;
let currentPhase='grupos';
let adminAuthed=false;
let modalOpen=null;

// ============================================================
//  RENDER
// ============================================================
function render(){
  const root=document.getElementById('root');
  let html='';
  if(modalOpen==='addPlayer') html+=renderAddPlayerModal();
  if(view==='home') html+=renderHome();
  else if(view==='player') html+=renderPlayer();
  else if(view==='leaderboard') html+=renderLeaderboard();
  else if(view==='admin') html+=renderAdmin();
  root.innerHTML=html;
  bindEvents();
}

function renderHeader(sub=''){
  return`<div class="header">
    <div class="header-badge">⚽ Prode del Mundial</div>
    <h1>El Prode Familiar</h1>
    ${sub?`<p>${sub}</p>`:''}
  </div>`;
}
function renderNav(){
  return`<nav class="nav">
    <button class="nav-btn${view==='home'?' active':''}" data-go="home">Jugadores</button>
    <button class="nav-btn${view==='leaderboard'?' active':''}" data-go="leaderboard">Tabla</button>
    <button class="nav-btn${view==='admin'?' active':''}" data-go="admin">⚙ Admin</button>
  </nav>`;
}

function renderHome(){
  const lb=getLeaderboard();
  const ptsMap=Object.fromEntries(lb.map(p=>[p.id,p.pts]));
  return renderHeader('Elegí tu nombre para cargar tu pronóstico')+renderNav()+
  `<div class="section">
    <div class="section-title">Jugadores <span class="badge badge-gray">${state.players.length}</span></div>
    <div class="players-grid">
      ${state.players.map(p=>`
        <div class="player-card" data-action="selectPlayer" data-pid="${p.id}">
          <div class="player-avatar" style="background:${avatarColor(p.name)}">${initials(p.name)}</div>
          <div class="player-card-name">${esc(p.name)}</div>
          <div class="player-card-pts">${ptsMap[p.id]||0} pts</div>
        </div>`).join('')}
      <div class="player-card player-add-card" data-action="openAddPlayer">
        <div class="player-avatar" style="background:var(--border)"><span style="font-size:26px;color:var(--muted)">+</span></div>
        <div class="player-card-name" style="color:var(--muted)">Agregar jugador</div>
      </div>
    </div>
  </div>
  <p class="tip">Tocá tu nombre para ver y editar tus pronósticos. Los cambios se sincronizan en todos los dispositivos.</p>`;
}

function renderPlayer(){
  const player=state.players.find(p=>p.id===currentPlayer);
  if(!player){view='home';return renderHome();}
  const ph=getPhase(currentPhase);
  const allResults=getAllResults();
  const preds=player.predictions||{};
  const tabs=state.phases.map(p=>`
    <button class="phase-tab${p.id===currentPhase?' active':''}${p.locked?' locked':''}" data-phase="${p.id}">
      ${p.locked?'🔒 ':''}${p.label}
    </button>`).join('');
  let matchesHtml='';
  if(ph.hasGroups){
    const byGroup={};
    for(const m of ph.matches){if(!byGroup[m.group])byGroup[m.group]=[];byGroup[m.group].push(m);}
    for(const[g,ms]of Object.entries(byGroup)){
      matchesHtml+=`<div class="group-label">${g}</div>`;
      matchesHtml+=ms.map(m=>renderMatchRow(m,preds,ph.locked,allResults)).join('');
    }
  }else{
    matchesHtml=ph.matches.map(m=>renderMatchRow(m,preds,ph.locked,allResults)).join('');
  }
  return`<div class="back-row" data-action="goHome">← Volver</div>
  <div class="player-header">
    <div class="player-avatar" style="background:${avatarColor(player.name)};width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#f0b429;flex-shrink:0">${initials(player.name)}</div>
    <div><div class="player-header-name">${esc(player.name)}</div><div class="player-header-sub">Exacto = 3 pts · Ganador/empate = 1 pt</div></div>
  </div>
  <div class="phase-tabs">${tabs}</div>
  ${ph.locked?`<div class="phase-locked-msg">🔒 Esta fase está cerrada. Ya no se pueden modificar los pronósticos.</div>`:''}
  <div class="section">
    <div class="section-title">${ph.label} ${ph.locked?'<span class="badge badge-red">Cerrada</span>':'<span class="badge badge-gold">Abierta</span>'}</div>
    <div id="matches-container">${matchesHtml}</div>
  </div>`;
}

function renderMatchRow(m,preds,locked,allResults){
  const pred=preds[m.id]||{home:null,away:null};
  const actual=allResults[m.id];
  const hv=pred.home!==null?pred.home:'';
  const av=pred.away!==null?pred.away:'';
  const dis=locked?'disabled':'';
  let pill='', actualStr='';
  if(actual&&actual.home!==null&&actual.away!==null){
    actualStr=`<div class="actual-score">Real: ${actual.home}–${actual.away}</div>`;
    if(pred.home!==null&&pred.away!==null){
      if(pred.home===actual.home&&pred.away===actual.away) pill='<span class="result-pill exact">+3 pts</span>';
      else if(Math.sign(pred.home-pred.away)===Math.sign(actual.home-actual.away)) pill='<span class="result-pill partial">+1 pt</span>';
      else pill='<span class="result-pill miss">0 pts</span>';
    }
  }
  return`<div class="match">
    <div class="team"><span class="team-flag">${flag(m.home)}</span><span class="team-name">${cleanName(m.home)}</span></div>
    <div class="score-box">
      <div class="score-inputs">
        <input class="score-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-pred="${m.id}" data-side="home" ${dis}>
        <span class="score-sep">:</span>
        <input class="score-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-pred="${m.id}" data-side="away" ${dis}>
      </div>
      ${actualStr}${pill}
    </div>
    <div class="team right"><span class="team-flag">${flag(m.away)}</span><span class="team-name">${cleanName(m.away)}</span></div>
  </div>`;
}

function renderLeaderboard(){
  const lb=getLeaderboard();
  const medals=['🥇','🥈','🥉'];
  const rowClass=['pos1','pos2','pos3'];
  return renderHeader('Tabla de posiciones')+renderNav()+
  `<div class="section">
    <div class="section-title">Puntuación</div>
    <div class="scoring-grid">
      <div class="scoring-card"><div class="val">3</div><div class="lbl">Resultado exacto</div></div>
      <div class="scoring-card"><div class="val">1</div><div class="lbl">Ganador o empate correcto</div></div>
      <div class="scoring-card"><div class="val">0</div><div class="lbl">Pronóstico incorrecto</div></div>
    </div>
    <div class="lb-header"><span></span><span>Jugador</span><span>Pts</span><span>Exactos</span><span>Parciales</span></div>
    ${lb.length===0?`<div class="empty">Todavía no hay jugadores registrados.</div>`:
      lb.map((p,i)=>`
        <div class="lb-row ${rowClass[i]||'other'}">
          <div class="lb-pos">${medals[i]||i+1}</div>
          <div class="lb-name">
            <div class="lb-mini-avatar" style="background:${avatarColor(p.name)}">${initials(p.name)}</div>
            ${esc(p.name)}
          </div>
          <div class="lb-pts">${p.pts}</div>
          <div class="lb-detail">${p.exact}</div>
          <div class="lb-detail">${p.part}</div>
        </div>`).join('')
    }
  </div>`;
}

function renderAdmin(){
  if(!adminAuthed) return renderAdminLogin();
  const ph=getPhase(currentPhase);
  const tabs=state.phases.map(p=>`
    <button class="phase-tab${p.id===currentPhase?' active':''}" data-phase="${p.id}">${p.label}</button>`).join('');
  let matchRows='';
  if(ph.hasGroups){
    const byGroup={};
    for(const m of ph.matches){if(!byGroup[m.group])byGroup[m.group]=[];byGroup[m.group].push(m);}
    for(const[g,ms]of Object.entries(byGroup)){
      matchRows+=`<div class="group-label">${g}</div>`;
      matchRows+=ms.map(renderAdminMatchRow).join('');
    }
  }else{
    matchRows=ph.matches.map(renderKOAdminRow).join('');
  }
  return renderHeader('Panel de administración')+renderNav()+
  `<div class="section">
    <div class="section-title">Fases</div>
    <div class="phase-tabs">${tabs}</div>
    <div class="btn-row" style="margin-top:0">
      <button class="btn${!ph.locked?' primary':''} sm" data-action="unlockPhase">✅ Abrir fase</button>
      <button class="btn${ph.locked?' primary':''} sm" data-action="lockPhase">🔒 Cerrar fase</button>
    </div>
    <p class="tip" style="margin-top:.75rem">Cerrá cada fase justo antes del primer partido para que nadie pueda editar sus pronósticos.</p>
  </div>
  <div class="section">
    <div class="section-title">Resultados reales — ${ph.label}</div>
    <div id="admin-matches">${matchRows}</div>
    <div class="btn-row">
      <button class="btn primary" data-action="saveResults">Guardar resultados</button>
      <button class="btn danger sm" data-action="resetResults">Limpiar fase</button>
    </div>
  </div>
  <div class="section">
    <div class="section-title">Jugadores</div>
    ${state.players.map(p=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px;font-weight:500">${esc(p.name)}</span>
        <button class="btn danger sm" data-action="deletePlayer" data-pid="${p.id}">Eliminar</button>
      </div>`).join('')}
    ${state.players.length===0?'<div class="empty">Sin jugadores.</div>':''}
  </div>
  <div class="section">
    <div class="section-title">Configuración</div>
    <label class="label">PIN de administrador</label>
    <div style="display:flex;gap:8px">
      <input class="input" id="pin-change" type="text" maxlength="8" value="${esc(state.adminPin)}" style="max-width:160px">
      <button class="btn primary" data-action="savePin">Guardar PIN</button>
    </div>
  </div>`;
}

function renderAdminMatchRow(m){
  const r=m.result||{};
  const hv=r.home!=null?r.home:'';
  const av=r.away!=null?r.away:'';
  return`<div class="admin-match">
    <span class="admin-team">${flag(m.home)} ${cleanName(m.home)}</span>
    <input class="admin-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-amid="${m.id}" data-side="home">
    <input class="admin-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-amid="${m.id}" data-side="away">
    <span class="admin-team right">${cleanName(m.away)} ${flag(m.away)}</span>
  </div>`;
}
function renderKOAdminRow(m){
  const r=m.result||{};
  const hv=r.home!=null?r.home:'';
  const av=r.away!=null?r.away:'';
  return`<div class="knockout-edit">
    <div class="knockout-row">
      <input class="input" type="text" placeholder="Equipo local" value="${esc(m.home==='Por definir'?'':m.home)}" data-amid="${m.id}" data-side="homeName" style="font-size:13px;padding:7px 10px">
      <input class="admin-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-amid="${m.id}" data-side="home">
      <input class="admin-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-amid="${m.id}" data-side="away">
      <input class="input" type="text" placeholder="Equipo visitante" value="${esc(m.away==='Por definir'?'':m.away)}" data-amid="${m.id}" data-side="awayName" style="font-size:13px;padding:7px 10px">
    </div>
  </div>`;
}
function renderAdminLogin(){
  return renderHeader('Administración')+renderNav()+
  `<div class="section" style="max-width:340px;margin:0 auto">
    <div class="section-title">Ingresar como administrador</div>
    <label class="label">PIN</label>
    <input class="input" id="admin-pin-field" type="password" placeholder="****" maxlength="8" style="margin-bottom:1rem">
    <button class="btn primary" style="width:100%" data-action="doAdminLogin">Ingresar</button>
    <p class="tip" style="margin-top:.75rem">PIN por defecto: 1234</p>
  </div>`;
}
function renderAddPlayerModal(){
  return`<div class="overlay" id="overlay">
    <div class="modal">
      <h2>Agregar jugador</h2>
      <label class="label">Nombre o apodo</label>
      <input class="input" id="new-player-name" type="text" placeholder="Ej: Mamá, El Tío, Juan..." maxlength="30" style="margin-bottom:1rem" autofocus>
      <div class="btn-row" style="margin-top:0">
        <button class="btn primary" data-action="confirmAddPlayer">Agregar</button>
        <button class="btn" data-action="closeModal">Cancelar</button>
      </div>
    </div>
  </div>`;
}

// ============================================================
//  EVENTS
// ============================================================
function bindEvents(){
  document.querySelectorAll('[data-go]').forEach(el=>el.addEventListener('click',()=>{
    view=el.dataset.go;render();
  }));
  document.querySelectorAll('[data-phase]').forEach(el=>el.addEventListener('click',()=>{
    currentPhase=el.dataset.phase;render();
  }));
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',handleAction));
  document.querySelectorAll('[data-pred]').forEach(input=>{
    input.addEventListener('change',()=>{
      const player=state.players.find(p=>p.id===currentPlayer);
      if(!player)return;
      if(!player.predictions)player.predictions={};
      const mid=input.dataset.pred,side=input.dataset.side;
      const val=input.value===''?null:parseInt(input.value);
      if(!player.predictions[mid])player.predictions[mid]={home:null,away:null};
      player.predictions[mid][side]=val;
      scheduleSave();
    });
  });
  const pf=document.getElementById('admin-pin-field');
  if(pf)pf.addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
  const nf=document.getElementById('new-player-name');
  if(nf)nf.addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddPlayer();});
  const ov=document.getElementById('overlay');
  if(ov)ov.addEventListener('click',e=>{if(e.target===ov){modalOpen=null;render();}});
}

function handleAction(){
  const action=this.dataset.action;
  if(action==='selectPlayer'){currentPlayer=this.dataset.pid;view='player';render();}
  else if(action==='openAddPlayer'){modalOpen='addPlayer';render();setTimeout(()=>{const f=document.getElementById('new-player-name');if(f)f.focus();},30);}
  else if(action==='closeModal'){modalOpen=null;render();}
  else if(action==='confirmAddPlayer'){confirmAddPlayer();}
  else if(action==='goHome'){view='home';render();}
  else if(action==='doAdminLogin'){doAdminLogin();}
  else if(action==='saveResults'){saveResults();}
  else if(action==='lockPhase'){setPhaseLock(true);}
  else if(action==='unlockPhase'){setPhaseLock(false);}
  else if(action==='deletePlayer'){deletePlayer(this.dataset.pid);}
  else if(action==='savePin'){savePin();}
  else if(action==='resetResults'){resetResults();}
}

function confirmAddPlayer(){
  const inp=document.getElementById('new-player-name');
  const name=(inp?inp.value:'').trim();
  if(!name)return;
  if(state.players.find(p=>p.name.toLowerCase()===name.toLowerCase())){alert('Ya existe un jugador con ese nombre.');return;}
  state.players.push({id:'p'+Date.now(),name,predictions:{}});
  modalOpen=null;render();scheduleSave();
}
function doAdminLogin(){
  const f=document.getElementById('admin-pin-field');
  if(f&&f.value===state.adminPin){adminAuthed=true;render();}
  else{alert('PIN incorrecto.');}
}
function saveResults(){
  const ph=getPhase(currentPhase);
  document.querySelectorAll('[data-amid]').forEach(input=>{
    const mid=input.dataset.amid,side=input.dataset.side;
    const m=ph.matches.find(x=>x.id===mid);
    if(!m)return;
    if(side==='homeName'){if(input.value.trim())m.home=input.value.trim();}
    else if(side==='awayName'){if(input.value.trim())m.away=input.value.trim();}
    else{
      const val=input.value===''?null:parseInt(input.value);
      if(!m.result)m.result={home:null,away:null};
      m.result[side]=val;
    }
  });
  scheduleSave();
  const btn=document.querySelector('[data-action="saveResults"]');
  if(btn){const orig=btn.textContent;btn.textContent='✅ Guardado';setTimeout(()=>{btn.textContent=orig;},1500);}
}
function setPhaseLock(lock){
  const ph=getPhase(currentPhase);if(ph){ph.locked=lock;render();scheduleSave();}
}
function deletePlayer(pid){
  if(!confirm('¿Eliminar este jugador y todos sus pronósticos?'))return;
  state.players=state.players.filter(p=>p.id!==pid);
  render();scheduleSave();
}
function savePin(){
  const f=document.getElementById('pin-change');
  if(f&&f.value.trim()){state.adminPin=f.value.trim();scheduleSave();alert('PIN actualizado.');}
}
function resetResults(){
  if(!confirm('¿Limpiar todos los resultados de esta fase?'))return;
  const ph=getPhase(currentPhase);ph.matches.forEach(m=>m.result=null);render();scheduleSave();
}

// ============================================================
//  INIT
// ============================================================
(async ()=>{
  syncStatus('saving','Cargando...');
  await loadFromCloud();
  render();
  syncStatus('ok','Conectado');
  startPolling();
})();
</script>
