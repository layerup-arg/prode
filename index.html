<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8001D;--blue:#0033A0;--green:#00A651;--yellow:#FFD100;
  --purple:#7C3AED;--orange:#F97316;--cyan:#0891B2;--pink:#BE185D;
  --dark:#080808;--dark2:#111;--dark3:#1a1a1a;--dark4:#222;
  --light:#f5f5f5;--muted:#666;--border:rgba(255,255,255,.1);
  --radius:14px;--radius-sm:9px;
}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--light);min-height:100vh;overflow-x:hidden}

/* ===== ANIMATED BG ===== */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:blobMove 14s ease-in-out infinite alternate}
.bg-blob:nth-child(1){width:600px;height:600px;background:var(--red);top:-150px;left:-150px;animation-delay:0s}
.bg-blob:nth-child(2){width:500px;height:500px;background:var(--blue);top:40%;right:-100px;animation-delay:-4s}
.bg-blob:nth-child(3){width:450px;height:450px;background:var(--green);bottom:-100px;left:30%;animation-delay:-8s}
.bg-blob:nth-child(4){width:400px;height:400px;background:var(--yellow);top:20%;left:40%;animation-delay:-2s}
@keyframes blobMove{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}

.app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 1rem 5rem}

/* ===== HEADER ===== */
.header{position:relative;overflow:hidden;padding:2.5rem 1rem 2rem;margin:0 -1rem 0;text-align:center}
.header-stripes{position:absolute;inset:0;display:flex;flex-direction:column}
.header-stripe-row{flex:1;display:flex}
.header-stripe-row span{flex:1}
.header-stripe-row:nth-child(1) span:nth-child(1){background:var(--red)}
.header-stripe-row:nth-child(1) span:nth-child(2){background:var(--blue)}
.header-stripe-row:nth-child(1) span:nth-child(3){background:var(--green)}
.header-stripe-row:nth-child(1) span:nth-child(4){background:var(--yellow)}
.header-stripe-row:nth-child(2) span:nth-child(1){background:var(--yellow)}
.header-stripe-row:nth-child(2) span:nth-child(2){background:var(--red)}
.header-stripe-row:nth-child(2) span:nth-child(3){background:var(--blue)}
.header-stripe-row:nth-child(2) span:nth-child(4){background:var(--green)}
.header-overlay{position:absolute;inset:0;background:rgba(0,0,0,.78)}
.header-content{position:relative;z-index:1}
.header-trophy{font-size:42px;line-height:1;margin-bottom:.5rem;filter:drop-shadow(0 0 20px rgba(255,209,0,.6));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 20px rgba(255,209,0,.6))}50%{filter:drop-shadow(0 0 40px rgba(255,209,0,.9))}}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:var(--yellow);color:#000;padding:5px 18px;border-radius:999px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.75rem}
.header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(32px,7vw,62px);font-weight:900;font-style:italic;color:#fff;text-transform:uppercase;letter-spacing:-1px;line-height:1;margin-bottom:.25rem}
.header h1 span{color:var(--yellow)}
.header p{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:.5px;font-weight:500}
.header-bottom-stripe{height:5px;background:linear-gradient(90deg,var(--red) 0%,var(--blue) 25%,var(--green) 50%,var(--yellow) 75%,var(--red) 100%);background-size:200% 100%;animation:stripeScroll 4s linear infinite}
@keyframes stripeScroll{0%{background-position:0% 0%}100%{background-position:200% 0%}}

/* ===== NAV ===== */
.nav{display:flex;gap:6px;padding:1.25rem 0 .75rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:9px 22px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:13px;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;backdrop-filter:blur(4px)}
.nav-btn:hover{color:#fff;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08)}
.nav-btn.active{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:800}

/* ===== SECTION ===== */
.section{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;backdrop-filter:blur(8px)}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;color:#fff;flex-wrap:wrap}
.section-title .accent{width:4px;height:24px;border-radius:2px;flex-shrink:0}
.badge{font-size:11px;padding:3px 11px;border-radius:999px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.badge-muted{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid var(--border)}
.badge-yellow{background:var(--yellow);color:#000}
.badge-red{background:var(--red);color:#fff}
.badge-green{background:var(--green);color:#fff}

/* ===== PHASE TABS ===== */
.phase-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:1.25rem;padding-bottom:4px;scrollbar-width:none}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{flex-shrink:0;padding:8px 18px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;backdrop-filter:blur(4px)}
.phase-tab:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.phase-tab.active{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:800}
.phase-tab.locked{opacity:.45}

/* ===== PLAYERS GRID ===== */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.player-card{border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .22s;overflow:hidden;position:relative}
.player-card-bg{position:absolute;inset:0;opacity:.18;transition:opacity .22s}
.player-card:hover .player-card-bg{opacity:.35}
.player-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.3);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.player-card-inner{position:relative;z-index:1;padding:1.1rem .75rem}
.player-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,.25)}
.player-card-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.3px;line-height:1.2}
.player-card-pts{font-size:11px;color:var(--yellow);margin-top:4px;font-weight:700;letter-spacing:.5px}
.player-add-card{background:rgba(255,255,255,.03);border-style:dashed;cursor:pointer}
.player-add-card:hover{border-color:var(--yellow)}

/* ===== GROUP ===== */
.group-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:14px 0 7px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.group-label:not(:first-child){margin-top:14px}
.group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== MATCH ROW ===== */
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.match:last-child{border-bottom:none}
.match-meta{grid-column:1/-1;display:flex;align-items:center;gap:6px;margin-bottom:3px}
.match-date{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px;font-family:'Barlow Condensed',sans-serif;display:flex;align-items:center;gap:5px}
.team{display:flex;align-items:center;gap:10px}
.team.right{flex-direction:row-reverse;text-align:right}
/* REAL FLAG IMAGE */
.team-flag-wrap{width:36px;height:26px;border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.15);position:relative;background:#222}
.team-flag-img{width:100%;height:100%;object-fit:cover;display:block}
.team-flag-fallback{width:36px;height:26px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;color:#fff;background:#2a2a2a;letter-spacing:.5px}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.3px;line-height:1.2}
.score-box{display:flex;align-items:center;justify-content:center;gap:4px;flex-direction:column}
.score-inputs{display:flex;align-items:center;gap:5px}
.score-input{width:38px;height:38px;text-align:center;border:1px solid var(--border);border-radius:7px;font-size:18px;font-weight:800;background:rgba(255,255,255,.06);color:#fff;-moz-appearance:textfield;font-family:'Barlow Condensed',sans-serif;transition:all .15s}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none}
.score-input:focus{outline:none;border-color:var(--yellow);background:rgba(255,209,0,.08);box-shadow:0 0 0 3px rgba(255,209,0,.12)}
.score-input:disabled{opacity:.3;cursor:not-allowed}
.score-sep{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--muted);font-weight:900;line-height:1}
.result-pill{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.result-pill.exact{background:var(--green);color:#fff;box-shadow:0 0 10px rgba(0,166,81,.4)}
.result-pill.partial{background:rgba(255,209,0,.15);color:var(--yellow);border:1px solid rgba(255,209,0,.4)}
.result-pill.miss{background:rgba(232,0,29,.15);color:#ff6b7a;border:1px solid rgba(232,0,29,.3)}
.actual-score{font-size:10px;color:var(--muted);font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}

/* ===== LEADERBOARD ===== */
.lb-header{display:grid;grid-template-columns:36px 1fr 54px 54px 54px;gap:8px;padding:4px 16px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.lb-row{display:grid;grid-template-columns:36px 1fr 54px 54px 54px;align-items:center;gap:8px;padding:13px 16px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:5px;position:relative;overflow:hidden;transition:transform .15s;border:1px solid transparent}
.lb-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.lb-row.pos1{background:rgba(255,209,0,.1);border-color:rgba(255,209,0,.25)}
.lb-row.pos1::before{background:var(--yellow)}
.lb-row.pos2{background:rgba(200,200,200,.07);border-color:rgba(200,200,200,.18)}
.lb-row.pos2::before{background:#c0c0c0}
.lb-row.pos3{background:rgba(205,127,50,.08);border-color:rgba(205,127,50,.2)}
.lb-row.pos3::before{background:#cd7f32}
.lb-row.other{background:rgba(255,255,255,.04);border-color:var(--border)}
.lb-pos{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;text-align:center}
.lb-row.pos1 .lb-pos{color:var(--yellow)}
.lb-row.pos2 .lb-pos{color:#c0c0c0}
.lb-row.pos3 .lb-pos{color:#cd7f32}
.lb-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;text-transform:uppercase;display:flex;align-items:center;gap:10px;color:#fff;letter-spacing:.3px}
.lb-mini-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.lb-pts{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--yellow)}
.lb-detail{text-align:center;font-size:14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600}
.scoring-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.scoring-card{padding:16px;background:rgba(255,255,255,.04);border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center}
.scoring-card .val{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;font-style:italic;color:var(--yellow);line-height:1}
.scoring-card .lbl{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;font-weight:600;letter-spacing:.3px}

/* ===== ADMIN ===== */
.admin-match{display:grid;grid-template-columns:1fr 54px 54px 1fr;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.admin-match:last-child{border-bottom:none}
.admin-input{width:52px;height:34px;text-align:center;border:1px solid var(--border);border-radius:7px;font-size:16px;font-weight:800;background:rgba(255,255,255,.06);color:#fff;-moz-appearance:textfield;font-family:'Barlow Condensed',sans-serif}
.admin-input::-webkit-outer-spin-button,.admin-input::-webkit-inner-spin-button{-webkit-appearance:none}
.admin-input:focus{outline:none;border-color:var(--yellow)}
.admin-team{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.admin-team.right{text-align:right}
.knockout-row{display:grid;grid-template-columns:1fr 46px 46px 1fr;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)}
.knockout-row:last-child{border-bottom:none}

/* ===== FORMS ===== */
.btn{padding:10px 22px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;font-size:14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.btn:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)}
.btn.primary{background:var(--yellow);color:#000;border-color:var(--yellow)}
.btn.primary:hover{background:#e6bc00}
.btn.danger{background:rgba(232,0,29,.12);color:#ff6b7a;border-color:rgba(232,0,29,.35)}
.btn.sm{padding:5px 14px;font-size:12px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem}
.input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-family:'Barlow',sans-serif;transition:border .15s}
.input:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,209,0,.08)}
.label{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;width:fit-content;padding:7px 12px;border-radius:var(--radius-sm);transition:all .15s;border:1px solid transparent}
.back-row:hover{color:#fff;background:rgba(255,255,255,.07);border-color:var(--border)}

/* ===== PLAYER HEADER ===== */
.player-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;padding:1.25rem 1.5rem;background:rgba(255,255,255,.04);border-radius:var(--radius);border:1px solid var(--border);border-left:5px solid var(--yellow);backdrop-filter:blur(8px)}
.player-header-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;font-style:italic;color:#fff;text-transform:uppercase;letter-spacing:-.5px;line-height:1}
.player-header-sub{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500;letter-spacing:.3px}
.phase-locked-msg{padding:12px 16px;background:rgba(232,0,29,.08);border:1px solid rgba(232,0,29,.25);border-radius:var(--radius-sm);font-size:13px;color:#ff8a96;margin-bottom:1rem;font-weight:600;display:flex;align-items:center;gap:8px}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(8px)}
.modal{background:#181818;border-radius:var(--radius);padding:1.75rem;width:100%;max-width:380px;border:1px solid var(--border);box-shadow:0 32px 80px rgba(0,0,0,.8)}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1.25rem;color:#fff}

/* ===== SYNC ===== */
.sync-bar{position:fixed;bottom:1.25rem;right:1.25rem;background:rgba(20,20,20,.95);border:1px solid var(--border);border-radius:999px;padding:8px 16px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:100;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .3s;backdrop-filter:blur(8px)}
.sync-bar.saving{color:var(--yellow);border-color:rgba(255,209,0,.3)}
.sync-bar.error{color:#ff6b7a;border-color:rgba(232,0,29,.3)}
.sync-bar.ok{color:var(--green);border-color:rgba(0,166,81,.3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.sync-bar.saving .sync-dot{animation:blink .8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== MISC ===== */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tip{font-size:12px;color:var(--muted);margin-top:.6rem;line-height:1.5;font-weight:500}

@media(max-width:580px){
  .match{grid-template-columns:1fr auto 1fr;gap:5px}
  .team-name{font-size:13px}
  .team-flag-wrap,.team-flag-fallback{width:28px;height:20px}
  .players-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  .lb-row,.lb-header{grid-template-columns:28px 1fr 44px 44px 44px}
  .score-input{width:34px;height:34px;font-size:16px}
  .admin-match{grid-template-columns:1fr 46px 46px 1fr}
}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
</div>

<div class="app" id="root"></div>
<div class="sync-bar" id="sync-bar"><span class="sync-dot"></span><span id="sync-msg">Conectando...</span></div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const BIN_ID    = '6a275cc9da38895dfe9d04c2';
const MASTER_KEY= '$2a$10$BFCDKms/rPAn3zcFFbTxoe31tARA4uHY6iU2i6tcqIQwCmxRFzOpe';
const API_BASE  = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ============================================================
//  FLAG MAP — iso2 codes for flagcdn.com
// ============================================================
const FLAG_MAP = {
  'Argentina':'ar','Brasil':'br','Francia':'fr','Alemania':'de','España':'es',
  'Portugal':'pt','Inglaterra':'gb-eng','Bélgica':'be','Países Bajos':'nl',
  'Croacia':'hr','Uruguay':'uy','México':'mx','Estados Unidos':'us','Canadá':'ca',
  'Japón':'jp','Marruecos':'ma','Senegal':'sn','Nigeria':'ng','Ghana':'gh',
  'Camerún':'cm','Ecuador':'ec','Qatar':'qa','Irán':'ir','Arabia Saudita':'sa',
  'Australia':'au','Dinamarca':'dk','Túnez':'tn','Polonia':'pl','Serbia':'rs',
  'Suiza':'ch','Corea del Sur':'kr','Colombia':'co','Costa Rica':'cr',
  'Turquía':'tr','Perú':'pe','Venezuela':'ve','Rumania':'ro','Argelia':'dz',
  'Irak':'iq','Kenia':'ke','Angola':'ao','Panamá':'pa','Nueva Zelanda':'nz',
  'Costa de Marfil':'ci','Eslovaquia':'sk','República Checa':'cz',
  'Por definir':'',
};
function getFlagUrl(teamName){
  const clean = teamName.replace(/\s*[\p{Emoji_Presentation}\p{Extended_Pictographic}]+\s*/gu,'').trim();
  const iso = FLAG_MAP[clean];
  if(!iso) return null;
  return `https://flagcdn.com/w40/${iso}.png`;
}
function renderFlag(teamName){
  const url = getFlagUrl(teamName);

async function loadFromCloud(){
  try{
    const resp=await fetch(API_BASE+'/latest',{headers:{'X-Master-Key':MASTER_KEY}});
    const data=await resp.json();
    if(data.record){
      if(data.record.players)state.players=data.record.players;
      if(data.record.adminPin)state.adminPin=data.record.adminPin;
      if(data.record.phases&&data.record.phases.length>0)state.phases=data.record.phases;
      return true;
    }
  }catch(e){syncStatus('error','Sin conexión');}
  return false;
}
async function saveToCloud(){
  syncStatus('saving','Guardando...');
  try{
    const resp=await fetch(API_BASE,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},body:JSON.stringify(state)});
    if(resp.ok)syncStatus('ok','Guardado ✓');
    else syncStatus('error','Error al guardar');
  }catch(e){syncStatus('error','Sin conexión');}
}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(saveToCloud,900);}

function getPhase(id){return state.phases.find(p=>p.id===id);}
function getAllResults(){const r={};for(const ph of state.phases)for(const m of ph.matches)if(m.result)r[m.id]=m.result;return r;}
function calcMatchPts(pred, actual){
  // Returns {pts, breakdown} for a single match
  // pred and actual are {home: N, away: N}
  if(!actual||actual.home===null||actual.away===null)return{pts:0,breakdown:null};
  if(!pred||pred.home===null||pred.away===null)return{pts:0,breakdown:null};

  // Exact result: 5 pts (includes everything)
  if(pred.home===actual.home && pred.away===actual.away)
    return{pts:5,breakdown:'exact'};

  let pts=0;
  let reasons=[];

  // 1pt — acertar ganador/perdedor/empate
  const predSign=Math.sign(pred.home-pred.away);
  const actSign=Math.sign(actual.home-actual.away);
  if(predSign===actSign){pts+=1;reasons.push('winner');}

  // 2pts — goles local exactos
  if(pred.home===actual.home){pts+=2;reasons.push('homeGoals');}

  // 2pts — goles visitante exactos
  if(pred.away===actual.away){pts+=2;reasons.push('awayGoals');}

  return{pts,breakdown:reasons.length>0?reasons:['miss']};
}

function calcPts(preds,results){
  let pts=0,exact=0,partial=0;
  for(const[mid,actual]of Object.entries(results)){
    const p=preds[mid];
    const{pts:mp,breakdown}=calcMatchPts(p,actual);
    pts+=mp;
    if(breakdown==='exact')exact++;
    else if(mp>0)partial++;
  }
  return{pts,exact,partial};
}
function getLeaderboard(){
  const results=getAllResults();
  return state.players.map(p=>{
    const{pts,exact,partial}=calcPts(p.predictions||{},results);
    return{...p,pts,exact,partial};
  }).sort((a,b)=>b.pts-a.pts||(b.exact-a.exact)||(b.partial-a.partial));
}
function initials(name){return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(dtStr){
  if(!dtStr)return'';
  const d=new Date(dtStr+':00-03:00');
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return`${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} hs`;
}

function renderPlayer(){

  if(!player){view='home';return renderHome();}
  const ph=getPhase(currentPhase);
  const allResults=getAllResults();
  const preds=player.predictions||{};

  const tabs=state.phases.map(p=>`

  if(ph.hasGroups){
    const byGroup={};
    for(const m of ph.matches){if(!byGroup[m.group])byGroup[m.group]=[];byGroup[m.group].push(m);}

      matchesHtml+=ms.map(m=>renderMatchRow(m,preds,ph.locked,allResults)).join('');

function renderMatchRow(m,preds,locked,allResults){
  const pred=preds[m.id]||{home:null,away:null};
  const actual=allResults[m.id];
  const hv=pred.home!==null?pred.home:'';
  const av=pred.away!==null?pred.away:'';
  const dis=locked?'disabled':'';
  let pill='',actualStr='';
  if(actual&&actual.home!==null&&actual.away!==null){
    actualStr=`<div class="actual-score">Real: ${actual.home}–${actual.away}</div>`;
    if(pred.home!==null&&pred.away!==null){
      const{pts:mp,breakdown}=calcMatchPts(pred,actual);
      if(breakdown==='exact'){
        pill=`<span class="result-pill exact">⭐ +5 pts</span>`;
      } else if(mp>0){
        const reasons=[];
        if(breakdown.includes('winner'))reasons.push('ganador');
        if(breakdown.includes('homeGoals'))reasons.push('goles local');
        if(breakdown.includes('awayGoals'))reasons.push('goles visit.');
        pill=`<span class="result-pill partial">+${mp} pts · ${reasons.join(' + ')}</span>`;
      } else {
        pill=`<span class="result-pill miss">0 pts</span>`;
      }
    }
  }
  const dateStr=m.dt?`<div class="match-meta"><div class="match-date">📅 ${formatDate(m.dt)}</div></div>`:'';
  return`<div class="match">
    ${dateStr}
    <div class="team">${renderFlag(m.home)}<span class="team-name">${esc(m.home)}</span></div>
    <div class="score-box">
      <div class="score-inputs">
        <input class="score-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-pred="${m.id}" data-side="home" ${dis}>
        <span class="score-sep">:</span>
        <input class="score-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-pred="${m.id}" data-side="away" ${dis}>
      </div>
      ${actualStr}${pill}
    </div>
    <div class="team right"><span class="team-name">${esc(m.away)}</span>${renderFlag(m.away)}</div>
  </div>`;
}

function renderLeaderboard(){
  const lb=getLeaderboard();
  const medals=['🥇','🥈','🥉'];
  const rowClass=['pos1','pos2','pos3'];
  return renderHeader('Tabla de posiciones')+renderNav()+
  `<div class="section">
    <div class="section-title"><span class="accent" style="background:var(--yellow)"></span>Sistema de puntos</div>
    <div class="scoring-grid">
      <div class="scoring-card"><div class="val">5</div><div class="lbl">Resultado exacto</div></div>
      <div class="scoring-card"><div class="val">2</div><div class="lbl">Goles de un equipo exactos</div></div>
      <div class="scoring-card"><div class="val">1</div><div class="lbl">Ganador o empate correcto</div></div>
    </div>
    <p class="tip" style="margin-bottom:1rem">Los puntos se acumulan. Ej: pronóstico 3-1, resultado 3-2 → <strong style="color:var(--yellow)">3 pts</strong> (1 ganador + 2 goles local)</p>
    <div class="lb-header"><span></span><span>Jugador</span><span>Pts</span><span>Exactos</span><span>Parciales</span></div>
    ${lb.length===0?`<div class="empty">Todavía no hay jugadores</div>`:
      lb.map((p,i)=>{
        const pal=playerPalette(p.name);
        return`<div class="lb-row ${rowClass[i]||'other'}">
          <div class="lb-pos">${medals[i]||i+1}</div>
          <div class="lb-name">
            <div class="lb-mini-avatar" style="background:${pal.bg};color:${pal.text}">${initials(p.name)}</div>
            ${esc(p.name)}
          </div>
          <div class="lb-pts">${p.pts}</div>
          <div class="lb-detail">${p.exact}</div>
          <div class="lb-detail">${p.partial}</div>
        </div>`;
      }).join('')
    }
  </div>`;
}

function renderAdmin(){
  if(!adminAuthed)return renderAdminLogin();
  const ph=getPhase(currentPhase);
  const tabs=state.phases.map(p=>`
    <button class="phase-tab${p.id===currentPhase?' active':''}" data-phase="${p.id}">${p.label}</button>`).join('');
  let matchRows='';
  if(ph.hasGroups){
    const byGroup={};
    for(const m of ph.matches){if(!byGroup[m.group])byGroup[m.group]=[];byGroup[m.group].push(m);}
    for(const[g,ms]of Object.entries(byGroup)){
      const col=GROUP_COLORS[g]||'#FFD100';
      matchRows+=`<div class="group-label"><span class="group-dot" style="background:${col}"></span>${g}</div>`;
      matchRows+=ms.map(renderAdminMatchRow).join('');
    }
  }else{
    matchRows=ph.matches.map(renderKOAdminRow).join('');
  }
  return renderHeader('Panel de administración')+renderNav()+
  `<div class="section">
    <div class="section-title"><span class="accent" style="background:var(--blue)"></span>Fases</div>
    <div class="phase-tabs">${tabs}</div>
    <div class="btn-row" style="margin-top:0">
      <button class="btn${!ph.locked?' primary':''} sm" data-action="unlockPhase">✅ Abrir fase</button>
      <button class="btn${ph.locked?' primary':''} sm" data-action="lockPhase">🔒 Cerrar fase</button>
    </div>
  </div>
  <div class="section">
    <div class="section-title"><span class="accent" style="background:var(--green)"></span>Resultados reales — ${ph.label}</div>
    <div id="admin-matches">${matchRows}</div>
    <div class="btn-row">
      <button class="btn primary" data-action="saveResults">Guardar resultados</button>
      <button class="btn danger sm" data-action="resetResults">Limpiar fase</button>
    </div>
  </div>
  <div class="section">
    <div class="section-title"><span class="accent" style="background:var(--red)"></span>Jugadores</div>
    ${state.players.map(p=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;color:#fff">${esc(p.name)}</span>
        <button class="btn danger sm" data-action="deletePlayer" data-pid="${p.id}">Eliminar</button>
      </div>`).join('')}
    ${state.players.length===0?'<div class="empty">Sin jugadores</div>':''}
  </div>
  <div class="section">
    <div class="section-title"><span class="accent" style="background:var(--purple)"></span>Configuración</div>
    <label class="label">PIN de administrador</label>
    <div style="display:flex;gap:8px">
      <input class="input" id="pin-change" type="text" maxlength="8" value="${esc(state.adminPin)}" style="max-width:160px">
      <button class="btn primary" data-action="savePin">Guardar</button>
    </div>
  </div>`;
}

function renderAdminMatchRow(m){
  const r=m.result||{};
  const hv=r.home!=null?r.home:'';
  const av=r.away!=null?r.away:'';
  return`<div class="admin-match">
    <span class="admin-team">${esc(m.home)}</span>
    <input class="admin-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-amid="${m.id}" data-side="home">
    <input class="admin-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-amid="${m.id}" data-side="away">
    <span class="admin-team right">${esc(m.away)}</span>
  </div>`;
}
function renderKOAdminRow(m){
  const r=m.result||{};
  const hv=r.home!=null?r.home:'';
  const av=r.away!=null?r.away:'';
  return`<div class="knockout-row">
    <input class="input" type="text" placeholder="Equipo local" value="${esc(m.home==='Por definir'?'':m.home)}" data-amid="${m.id}" data-side="homeName" style="font-size:13px;padding:7px 10px">
    <input class="admin-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-amid="${m.id}" data-side="home">
    <input class="admin-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-amid="${m.id}" data-side="away">
    <input class="input" type="text" placeholder="Equipo visitante" value="${esc(m.away==='Por definir'?'':m.away)}" data-amid="${m.id}" data-side="awayName" style="font-size:13px;padding:7px 10px">
  </div>`;
}
function renderAdminLogin(){
  return renderHeader('Administración')+renderNav()+
  `<div class="section" style="max-width:340px;margin:0 auto">
    <div class="section-title"><span class="accent" style="background:var(--yellow)"></span>Admin</div>
    <label class="label">PIN</label>
    <input class="input" id="admin-pin-field" type="password" placeholder="••••" maxlength="8" style="margin-bottom:1rem">
    <button class="btn primary" style="width:100%" data-action="doAdminLogin">Ingresar</button>
    <p class="tip" style="margin-top:.75rem">PIN por defecto: 1234</p>
  </div>`;
}
function renderAddPlayerModal(){
  return`<div class="overlay" id="overlay">
    <div class="modal">
      <h2>Agregar jugador</h2>
      <label class="label">Nombre o apodo</label>
      <input class="input" id="new-player-name" type="text" placeholder="Ej: Mamá, El Tío, Juan..." maxlength="30" style="margin-bottom:1rem" autofocus>
      <div class="btn-row" style="margin-top:0">
        <button class="btn primary" data-action="confirmAddPlayer">Agregar</button>
        <button class="btn" data-action="closeModal">Cancelar</button>
      </div>
    </div>
  </div>`;
}

// ============================================================
//  EVENTS
// ============================================================
function bindEvents(){
  document.querySelectorAll('[data-go]').forEach(el=>el.addEventListener('click',()=>{view=el.dataset.go;render();}));
  document.querySelectorAll('[data-phase]').forEach(el=>el.addEventListener('click',()=>{currentPhase=el.dataset.phase;render();}));
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',handleAction));
  document.querySelectorAll('[data-pred]').forEach(input=>{
    input.addEventListener('change',()=>{
      const player=state.players.find(p=>p.id===currentPlayer);
      if(!player)return;
      if(!player.predictions)player.predictions={};
      const mid=input.dataset.pred,side=input.dataset.side;
      const val=input.value===''?null:parseInt(input.value);
      if(!player.predictions[mid])player.predictions[mid]={home:null,away:null};
      player.predictions[mid][side]=val;
      scheduleSave();
    });
  });
  const pf=document.getElementById('admin-pin-field');
  if(pf)pf.addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
  const nf=document.getElementById('new-player-name');
  if(nf)nf.addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddPlayer();});
  const ov=document.getElementById('overlay');
  if(ov)ov.addEventListener('click',e=>{if(e.target===ov){modalOpen=null;render();}});
}

function handleAction(){
  const a=this.dataset.action;
  if(a==='selectPlayer'){currentPlayer=this.dataset.pid;view='player';render();}
  else if(a==='openAddPlayer'){modalOpen='addPlayer';render();setTimeout(()=>{document.getElementById('new-player-name')?.focus();},30);}
  else if(a==='closeModal'){modalOpen=null;render();}
  else if(a==='confirmAddPlayer'){confirmAddPlayer();}
  else if(a==='goHome'){view='home';render();}
  else if(a==='doAdminLogin'){doAdminLogin();}
  else if(a==='saveResults'){saveResults();}
  else if(a==='lockPhase'){setPhaseLock(true);}
  else if(a==='unlockPhase'){setPhaseLock(false);}
  else if(a==='deletePlayer'){deletePlayer(this.dataset.pid);}
  else if(a==='savePin'){savePin();}
  else if(a==='resetResults'){resetResults();}
}

function confirmAddPlayer(){
  const inp=document.getElementById('new-player-name');
  const name=(inp?inp.value:'').trim();
  if(!name)return;
  if(state.players.find(p=>p.name.toLowerCase()===name.toLowerCase())){alert('Ya existe un jugador con ese nombre.');return;}
  state.players.push({id:'p'+Date.now(),name,predictions:{}});
  modalOpen=null;render();scheduleSave();
}
function doAdminLogin(){
  const f=document.getElementById('admin-pin-field');
  if(f&&f.value===state.adminPin){adminAuthed=true;render();}
  else alert('PIN incorrecto.');
}
function saveResults(){
  const ph=getPhase(currentPhase);
  document.querySelectorAll('[data-amid]').forEach(input=>{
    const mid=input.dataset.amid,side=input.dataset.side;
    const m=ph.matches.find(x=>x.id===mid);
    if(!m)return;
    if(side==='homeName'){if(input.value.trim())m.home=input.value.trim();}
    else if(side==='awayName'){if(input.value.trim())m.away=input.value.trim();}
    else{const val=input.value===''?null:parseInt(input.value);if(!m.result)m.result={home:null,away:null};m.result[side]=val;}
  });
  scheduleSave();
  const btn=document.querySelector('[data-action="saveResults"]');
  if(btn){const o=btn.textContent;btn.textContent='✅ Guardado';setTimeout(()=>{btn.textContent=o;},1500);}
}
function setPhaseLock(lock){const ph=getPhase(currentPhase);if(ph){ph.locked=lock;render();scheduleSave();}}
function deletePlayer(pid){
  if(!confirm('¿Eliminar este jugador?'))return;
  state.players=state.players.filter(p=>p.id!==pid);render();scheduleSave();
}
function savePin(){
  const f=document.getElementById('pin-change');
  if(f&&f.value.trim()){state.adminPin=f.value.trim();scheduleSave();alert('PIN actualizado.');}
}
function resetResults(){
  if(!confirm('¿Limpiar resultados de esta fase?'))return;
  const ph=getPhase(currentPhase);ph.matches.forEach(m=>m.result=null);render();scheduleSave();
}

// ============================================================
//  INIT
// ============================================================
(async()=>{
  syncStatus('saving','Cargando...');
  await loadFromCloud();
  render();
  syncStatus('ok','Conectado');
  startPolling();
})();
</script>
</body>
</html>
