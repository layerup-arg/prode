<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8001D;--blue:#0033A0;--green:#00A651;--yellow:#FFD100;
  --purple:#7C3AED;--orange:#F97316;--cyan:#0891B2;--pink:#BE185D;
  --dark:#080808;--dark2:#111;--dark3:#1a1a1a;--dark4:#222;
  --light:#f5f5f5;--muted:#666;--border:rgba(255,255,255,.1);
  --radius:14px;--radius-sm:9px;
}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--light);min-height:100vh;overflow-x:hidden}

/* BG BLOBS */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:blobMove 14s ease-in-out infinite alternate}
.bg-blob:nth-child(1){width:600px;height:600px;background:var(--red);top:-150px;left:-150px}
.bg-blob:nth-child(2){width:500px;height:500px;background:var(--blue);top:40%;right:-100px;animation-delay:-4s}
.bg-blob:nth-child(3){width:450px;height:450px;background:var(--green);bottom:-100px;left:30%;animation-delay:-8s}
.bg-blob:nth-child(4){width:400px;height:400px;background:var(--yellow);top:20%;left:40%;animation-delay:-2s}
@keyframes blobMove{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}

.app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 1rem 5rem}

/* HEADER */
.header{position:relative;overflow:hidden;padding:2.5rem 1rem 2rem;margin:0 -1rem;text-align:center}
.header-stripes{position:absolute;inset:0;display:flex}
.header-stripes span{flex:1}
.header-stripes span:nth-child(1){background:var(--red)}
.header-stripes span:nth-child(2){background:var(--blue)}
.header-stripes span:nth-child(3){background:var(--green)}
.header-stripes span:nth-child(4){background:var(--yellow)}
.header-overlay{position:absolute;inset:0;background:rgba(0,0,0,.78)}
.header-content{position:relative;z-index:1}
.header-trophy{font-size:42px;line-height:1;margin-bottom:.5rem;filter:drop-shadow(0 0 20px rgba(255,209,0,.6));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 20px rgba(255,209,0,.6))}50%{filter:drop-shadow(0 0 40px rgba(255,209,0,.9))}}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:var(--yellow);color:#000;padding:5px 18px;border-radius:999px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.75rem}
.header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(32px,7vw,62px);font-weight:900;font-style:italic;color:#fff;text-transform:uppercase;letter-spacing:-1px;line-height:1;margin-bottom:.25rem}
.header h1 span{color:var(--yellow)}
.header p{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:.5px;font-weight:500}
.header-stripe{height:5px;background:linear-gradient(90deg,var(--red),var(--blue),var(--green),var(--yellow),var(--red));background-size:200%;animation:stripe 4s linear infinite}
@keyframes stripe{0%{background-position:0%}100%{background-position:200%}}

/* NAV */
.nav{display:flex;gap:6px;padding:1.25rem 0 .75rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:9px 22px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:13px;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.nav-btn:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.nav-btn.active{background:var(--yellow);color:#000;border-color:var(--yellow)}

/* SECTION */
.section{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;backdrop-filter:blur(8px)}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;color:#fff;flex-wrap:wrap}
.accent{width:4px;height:24px;border-radius:2px;flex-shrink:0}
.badge{font-size:11px;padding:3px 11px;border-radius:999px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.badge-muted{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid var(--border)}
.badge-yellow{background:var(--yellow);color:#000}
.badge-red{background:var(--red);color:#fff}
.badge-green{background:var(--green);color:#fff}

/* PHASE TABS */
.phase-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:1.25rem;padding-bottom:4px;scrollbar-width:none}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{flex-shrink:0;padding:8px 18px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:12px;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.phase-tab:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.phase-tab.active{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:800}
.phase-tab.locked{opacity:.45}

/* PLAYERS */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.player-card{border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .22s;overflow:hidden;position:relative}
.player-card-bg{position:absolute;inset:0;opacity:.18;transition:opacity .22s}
.player-card:hover .player-card-bg{opacity:.35}
.player-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.3);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.player-card-inner{position:relative;z-index:1;padding:1.1rem .75rem}
.player-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,.25)}
.player-card-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.3px}
.player-card-pts{font-size:11px;color:var(--yellow);margin-top:4px;font-weight:700;letter-spacing:.5px}
.add-player-card{border-style:dashed;background:transparent}
.add-player-card:hover{border-color:var(--yellow)}

/* GROUP LABEL */
.group-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:14px 0 7px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.group-label:not(:first-child){margin-top:14px}
.group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.group-table-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);font-size:13px;padding:2px 8px;border-radius:6px;cursor:pointer;margin-left:auto;transition:all .15s;line-height:1;font-family:inherit}
.group-table-btn:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}

/* SAVE PREDICTIONS BUTTON */
.save-preds-btn{margin-left:auto;padding:7px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.save-preds-btn.dirty{background:var(--yellow);color:#000;border-color:var(--yellow);animation:savePulse 2s ease-in-out infinite}
.save-preds-btn:not(.dirty){cursor:default}
@keyframes savePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,209,0,.4)}50%{box-shadow:0 0 0 6px rgba(255,209,0,0)}}

/* GROUP TABS */
.group-tabs-wrap{margin-bottom:1rem}
.group-tabs{display:flex;gap:5px;flex-wrap:wrap}
.group-tab{position:relative;width:42px;height:42px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;padding-bottom:6px}
.group-tab:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.group-tab.active{background:var(--yellow);color:#000;border-color:var(--yellow)}
/* indicator dot */
.gtab-dot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%}
.gtab-complete .gtab-dot{background:var(--green)}
.gtab-partial  .gtab-dot{background:var(--yellow)}
.gtab-empty    .gtab-dot{background:rgba(255,255,255,.2)}
.group-tab.active .gtab-dot{background:rgba(0,0,0,.4)}
/* group header row */
.group-header{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px}

/* OLD group-label kept for admin view */
.group-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:14px 0 7px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.group-label:not(:first-child){margin-top:14px}
.gt-table{width:100%;border-collapse:collapse;margin-top:.75rem}
.gt-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:5px 8px;border-bottom:1px solid var(--border);text-align:center}
.gt-table th.left{text-align:left}
.gt-table td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;vertical-align:middle}
.gt-table td.center{text-align:center}
.gt-table tr:last-child td{border-bottom:none}
.gt-rank{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--muted);text-align:center;width:24px}
.gt-rank.q{color:var(--green)}
.gt-rank.q3{color:var(--yellow)}
.gt-team{display:flex;align-items:center;gap:8px}
.gt-pts{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--yellow);text-align:center}
.gt-stat{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--muted);text-align:center}
.gt-gd.pos{color:var(--green)}.gt-gd.neg{color:#ff6b7a}.gt-gd.zero{color:var(--muted)}
.gt-note{font-size:11px;color:var(--muted);margin-top:.75rem;line-height:1.5;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:6px;border-left:3px solid var(--yellow)}

/* MATCH ROW */
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.match:last-child{border-bottom:none}
.match-meta{grid-column:1/-1;display:flex;align-items:center;gap:6px;margin-bottom:3px}
.match-date{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.4px;font-family:'Barlow Condensed',sans-serif}
.team{display:flex;align-items:center;gap:10px}
.team.right{flex-direction:row-reverse;text-align:right}
.team-flag{width:36px;height:26px;border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.15);background:#222}
.team-flag img{width:100%;height:100%;object-fit:cover;display:block}
.team-flag-fb{width:36px;height:26px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;color:#fff;background:#2a2a2a;letter-spacing:.5px}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.3px;line-height:1.2}
.team-name.placeholder{color:var(--muted)!important;font-weight:600!important;font-style:italic;font-size:13px!important;text-transform:none!important}
.score-box{display:flex;align-items:center;justify-content:center;gap:4px;flex-direction:column}
.score-inputs{display:flex;align-items:center;gap:5px}
.score-input{width:38px;height:38px;text-align:center;border:1px solid var(--border);border-radius:7px;font-size:18px;font-weight:800;background:rgba(255,255,255,.06);color:#fff;-moz-appearance:textfield;font-family:'Barlow Condensed',sans-serif;transition:all .15s}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none}
.score-input:focus{outline:none;border-color:var(--yellow);background:rgba(255,209,0,.08);box-shadow:0 0 0 3px rgba(255,209,0,.12)}
.score-input:disabled{opacity:.3;cursor:not-allowed}
.score-sep{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--muted);font-weight:900;line-height:1}
.result-pill{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.result-pill.exact{background:var(--green);color:#fff;box-shadow:0 0 10px rgba(0,166,81,.4)}
.result-pill.partial{background:rgba(255,209,0,.15);color:var(--yellow);border:1px solid rgba(255,209,0,.4)}
.result-pill.miss{background:rgba(232,0,29,.15);color:#ff6b7a;border:1px solid rgba(232,0,29,.3)}
.actual-score{font-size:10px;color:var(--muted);font-weight:600;font-family:'Barlow Condensed',sans-serif}

/* MATCH DONE (resultado conocido) */
.match-done{padding:10px 0;border-bottom:1px solid var(--border)}
.match-done:last-child{border-bottom:none}
.match-done-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.match-done-team{display:flex;align-items:center;gap:10px}
.match-done-team.right{flex-direction:row-reverse;text-align:right}
.match-done-center{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:200px}
.scores-wrap{display:flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.score-col{display:flex;flex-direction:column;align-items:center;padding:8px 16px;gap:3px}
.score-col-divider{width:1px;background:var(--border);align-self:stretch}
.score-col-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.score-col-value{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;line-height:1;display:flex;align-items:center;gap:4px}
.score-col-sep{font-size:16px;color:var(--muted);font-weight:700}
.pred-value{color:rgba(255,255,255,.45)}
.real-value{color:#fff}
.match-exact .scores-wrap{border-color:rgba(0,166,81,.4);background:rgba(0,166,81,.08)}
.match-exact .real-value{color:var(--green)}
.match-partial .scores-wrap{border-color:rgba(255,209,0,.25);background:rgba(255,209,0,.05)}
.match-miss .scores-wrap{border-color:rgba(232,0,29,.2);background:rgba(232,0,29,.04)}
.match-miss .pred-value{color:rgba(255,255,255,.25)}

/* LEADERBOARD */
.lb-header{display:grid;grid-template-columns:36px 1fr 54px 44px 44px 44px;gap:6px;padding:4px 16px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.lb-row{display:grid;grid-template-columns:36px 1fr 54px 44px 44px 44px;align-items:center;gap:6px;padding:13px 16px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:5px;position:relative;overflow:hidden;border:1px solid transparent}
.lb-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px}
.lb-row.pos1{background:rgba(255,209,0,.1);border-color:rgba(255,209,0,.25)}.lb-row.pos1::before{background:var(--yellow)}
.lb-row.pos2{background:rgba(200,200,200,.07);border-color:rgba(200,200,200,.18)}.lb-row.pos2::before{background:#c0c0c0}
.lb-row.pos3{background:rgba(205,127,50,.08);border-color:rgba(205,127,50,.2)}.lb-row.pos3::before{background:#cd7f32}
.lb-row.other{background:rgba(255,255,255,.04);border-color:var(--border)}
.lb-pos{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;text-align:center}
.lb-row.pos1 .lb-pos{color:var(--yellow)}.lb-row.pos2 .lb-pos{color:#c0c0c0}.lb-row.pos3 .lb-pos{color:#cd7f32}
.lb-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;text-transform:uppercase;display:flex;align-items:center;gap:10px;color:#fff}
.lb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;border:2px solid rgba(255,255,255,.2)}
.lb-pts{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--yellow)}
.lb-detail{text-align:center;font-size:14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600}
.scoring-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.scoring-card{padding:16px;background:rgba(255,255,255,.04);border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center}
.scoring-card .val{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;font-style:italic;color:var(--yellow);line-height:1}
.scoring-card .lbl{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;font-weight:600}

/* ADMIN */
.admin-match{display:grid;grid-template-columns:1fr 54px 54px 1fr;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)}
.admin-match:last-child{border-bottom:none}
.admin-input{width:52px;height:34px;text-align:center;border:1px solid var(--border);border-radius:7px;font-size:16px;font-weight:800;background:rgba(255,255,255,.06);color:#fff;-moz-appearance:textfield;font-family:'Barlow Condensed',sans-serif}
.admin-input::-webkit-outer-spin-button,.admin-input::-webkit-inner-spin-button{-webkit-appearance:none}
.admin-input:focus{outline:none;border-color:var(--yellow)}
.admin-team{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;text-transform:uppercase}
.admin-team.right{text-align:right}
.ko-row{display:grid;grid-template-columns:1fr 46px 46px 1fr;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)}
.ko-row:last-child{border-bottom:none}

/* FORMS */
.btn{padding:10px 22px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;font-size:14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.btn:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)}
.btn.primary{background:var(--yellow);color:#000;border-color:var(--yellow)}
.btn.primary:hover{background:#e6bc00}
.btn.danger{background:rgba(232,0,29,.12);color:#ff6b7a;border-color:rgba(232,0,29,.35)}
.btn.sm{padding:5px 14px;font-size:12px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem}
.input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-family:'Barlow',sans-serif;transition:border .15s}
.input:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,209,0,.08)}
.label{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;width:fit-content;padding:7px 12px;border-radius:var(--radius-sm);transition:all .15s;border:1px solid transparent}
.back-row:hover{color:#fff;background:rgba(255,255,255,.07);border-color:var(--border)}
.info-btn{padding:5px 14px;border-radius:999px;border:1px solid rgba(255,209,0,.4);background:rgba(255,209,0,.1);color:var(--yellow);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-left:4px}
.info-btn:hover{background:rgba(255,209,0,.2);border-color:var(--yellow)}

/* PLAYER HEADER */

    const results    = resRes.ok  ? await resRes.json()  : [];
    const phases     = phRes.ok   ? await phRes.json()   : [];
    const settings   = setRes.ok  ? await setRes.json()  : [];

    return { players, preds, results, phases, settings };

    return this._fetch('prode_players', {

function syncStatus(type, msg) {

// ============================================================
// CLOUD LOAD — populate state from Supabase
// ============================================================
async function loadFromCloud() {
  try {
    const { players, preds, results, phases, settings } = await DB.loadAll();

    // Build prediction map: { playerId: { matchId: {home, away} } }
    const predMap = {};
    for (const p of preds) {
      if (!predMap[p.player_id]) predMap[p.player_id] = {};
      predMap[p.player_id][p.match_id] = { home: p.home_goals, away: p.away_goals };
    }

    // Build results map: { matchId: {home, away} }
    const resMap = {};
    for (const r of results) resMap[r.match_id] = { home: r.home_goals, away: r.away_goals };

    // Build phase lock map
    const lockMap = {};
    for (const p of phases) lockMap[p.id] = p.locked;

    // Populate state.players with their predictions
    state.players = players.map(p => ({ ...p, predictions: predMap[p.id] || {} }));

    // Populate state.phases using DEFAULT_PHASES as template, overlaying DB data
    state.phases = DEFAULT_PHASES.map(ph => ({
      ...ph,
      locked: lockMap[ph.id] ?? ph.locked,
      matches: ph.matches.map(m => ({ ...m, result: resMap[m.id] || null })),
    }));

    // Apply settings
    const pinRow = settings.find(s => s.key === 'adminPin');
    if (pinRow) state.adminPin = pinRow.value;

    return true;
  } catch (e) {
    console.error('loadFromCloud error:', e);
    syncStatus('error', e.name === 'AbortError' ? 'Timeout' : 'Sin conexión');
    return false;
  }
}

// ============================================================
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function playerColor(name) {
  let h = 0;
  for (const c of name) h += c.charCodeAt(0);
  return PLAYER_COLORS[h % PLAYER_COLORS.length];
}

function isPlaceholder(name) {
  return !name || name === 'Por definir' || /^(1º|2º|3º|Gan\.)/.test(name);
}

function flagHTML(teamName) {
  const iso = FLAG_ISO[teamName];
  const fb  = initials(teamName);
  if (iso) {
    return `<div class="team-flag"><img src="https://flagcdn.com/w40/${iso}.png" alt="${teamName}" loading="lazy" onerror="this.parentNode.outerHTML='<div class=team-flag-fb>${fb}</div>'"></div>`;
  }
  return `<div class="team-flag-fb">${fb}</div>`;
}

function teamHTML(name, side = 'left') {
  const ph = isPlaceholder(name);
  const nameSpan = `<span class="team-name${ph ? ' placeholder' : ''}">${esc(name || 'Por definir')}</span>`;
  const flag = ph ? '' : flagHTML(name);
  return side === 'right'
    ? `<div class="team right">${nameSpan}${flag}</div>`
    : `<div class="team">${flag}${nameSpan}</div>`;
}

function fmtDate(dtStr) {
  if (!dtStr) return '';
  const d = new Date(dtStr + ':00-03:00');
  const dias  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} hs`;
}

// ============================================================
// SCORING
// ============================================================
function scoreMatch(pred, actual) {
  if (!actual || actual.home === null || actual.away === null) return { pts: 0, breakdown: null };
  if (!pred   || pred.home  === null || pred.away  === null)  return { pts: 0, breakdown: null };

  if (pred.home === actual.home && pred.away === actual.away)
    return { pts: 5, breakdown: 'exact' };

  let pts = 0;
  const reasons = [];
  if (Math.sign(pred.home - pred.away) === Math.sign(actual.home - actual.away)) { pts += 1; reasons.push('winner'); }
  if (pred.home === actual.home) { pts += 2; reasons.push('homeGoals'); }
  if (pred.away === actual.away) { pts += 2; reasons.push('awayGoals'); }
  return { pts, breakdown: reasons.length ? reasons : ['miss'] };
}

function calcPlayerScore(predictions) {
  let pts = 0, homeGoals = 0, awayGoals = 0, winner = 0;
  for (const ph of state.phases) {
    for (const m of ph.matches) {
      if (!m.result) continue;
      const pred = predictions[m.id];
      const { pts: mp, breakdown } = scoreMatch(pred, m.result);
      pts += mp;
      if (breakdown === 'exact') { homeGoals++; awayGoals++; winner++; }
      else if (Array.isArray(breakdown)) {
        if (breakdown.includes('homeGoals')) homeGoals++;
        if (breakdown.includes('awayGoals')) awayGoals++;
        if (breakdown.includes('winner'))    winner++;
      }
    }
  }
  return { pts, homeGoals, awayGoals, winner };
}

function getLeaderboard() {
  return state.players
    .map(p => ({ ...p, ...calcPlayerScore(p.predictions || {}) }))
    .sort((a, b) => b.pts - a.pts || (b.homeGoals + b.awayGoals) - (a.homeGoals + a.awayGoals) || b.winner - a.winner);
}

function pillHTML(pred, actual) {
  const { pts, breakdown } = scoreMatch(pred, actual);
  if (!breakdown) return '';
  if (breakdown === 'exact')  return `<span class="result-pill exact">⭐ +5</span>`;
  if (breakdown[0] === 'miss') return `<span class="result-pill miss">0 pts</span>`;
  const labels = breakdown.map(b => ({ winner:'ganador', homeGoals:'goles local', awayGoals:'goles visit.' }[b] || b));
  return `<span class="result-pill partial">+${pts} · ${labels.join(' + ')}</span>`;
}

function renderPlayer() {
  const player = state.players.find(p => p.id === currentPlayer);
  if (!player) { view = 'home'; return renderHome(); }

  const ph  = state.phases.find(p => p.id === currentPhase);
  const pal = playerColor(player.name);
  const preds = player.predictions || {};

  // Phase tabs (Grupos / Ronda 32 / etc.)
  const phaseTabs = state.phases.map(p =>
    `<button class="phase-tab${p.id === currentPhase ? ' active' : ''}${p.locked ? ' locked' : ''}" data-phase="${p.id}">
      ${p.locked ? '🔒 ' : ''}${p.label}
    </button>`
  ).join('');

  let matchesHTML = '';

  if (ph.hasGroups) {
    // Build group map
    const byGroup = {};
    for (const m of ph.matches) {
      if (!byGroup[m.group]) byGroup[m.group] = [];
      byGroup[m.group].push(m);
    }
    const groupNames = Object.keys(byGroup); // A–L

    // Compute completion per group
    const groupStatus = {}; // 'complete' | 'partial' | 'empty'
    for (const [grp, ms] of Object.entries(byGroup)) {
      const filled = ms.filter(m => preds[m.id]?.home != null && preds[m.id]?.away != null).length;
      groupStatus[grp] = filled === ms.length ? 'complete' : filled > 0 ? 'partial' : 'empty';
    }

    // Default to first incomplete group if currentGroup not set or not in list
    if (!currentGroup || !groupNames.includes(currentGroup)) {
      currentGroup = groupNames.find(g => groupStatus[g] !== 'complete') || groupNames[0];
    }

    // Group letter tabs
    const groupTabs = groupNames.map(grp => {
      const letter = grp.replace('Grupo ', '');
      const status = groupStatus[grp];
      const indicator = status === 'complete' ? 'gtab-complete' : status === 'partial' ? 'gtab-partial' : 'gtab-empty';
      const isActive = grp === currentGroup;
      return `<button class="group-tab${isActive ? ' active' : ''} ${indicator}" data-groupsel="${grp}" title="${grp}">
        ${letter}
        <span class="gtab-dot"></span>
      </button>`;
    }).join('');

    // Matches of selected group
    const col = GROUP_COLORS[currentGroup] || '#FFD100';
    const activeMatches = byGroup[currentGroup] || [];
    matchesHTML = `
      <div class="group-tabs-wrap">
        <div class="group-tabs">${groupTabs}</div>
      </div>
      <div class="group-header">
        <span class="group-dot" style="background:${col}"></span>
        <span>${currentGroup}</span>
        <button class="group-table-btn" data-action="openGroupTable" data-group="${currentGroup}" title="Ver tabla simulada">📊</button>
      </div>
      ${activeMatches.map(m => renderMatchRow(m, preds, ph.locked)).join('')}
    `;
  } else {
    matchesHTML = ph.matches.map(m => renderMatchRow(m, preds, ph.locked)).join('');
  }

  return `
    <div class="back-row" data-action="goHome">← Volver</div>
    <div class="player-header" style="border-left-color:${pal.bg}">
      <div style="width:58px;height:58px;border-radius:50%;background:${pal.bg};color:${pal.text};display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;flex-shrink:0">${initials(player.name)}</div>
      <div>
        <div class="player-header-name">${esc(player.name)}</div>
        <div class="player-header-sub">Exacto = 5 pts &nbsp;·&nbsp; Goles exactos = 2 pts &nbsp;·&nbsp; Ganador = 1 pt</div>
      </div>
    </div>
    <div class="phase-tabs">${phaseTabs}</div>
    ${ph.locked ? `<div class="phase-locked-msg">🔒 Fase cerrada — los pronósticos ya no se pueden modificar</div>` : ''}
    <div class="section">
      <div class="section-title">
        <span class="accent" style="background:${ph.locked ? 'var(--red)' : 'var(--green)'}"></span>
        ${ph.label}
        ${ph.locked ? '<span class="badge badge-red">Cerrada</span>' : '<span class="badge badge-green">Abierta</span>'}
        ${!ph.locked ? `<button class="save-preds-btn${dirtyPreds ? ' dirty' : ''}" data-action="savePredictions" id="save-preds-btn">
          ${dirtyPreds ? '💾 Grabar cambios' : '✅ Guardado'}

}

function renderMatchRow(m, predictions, locked) {
  const pred   = predictions[m.id] || { home: null, away: null };
  const actual = m.result;
  const hv     = pred.home !== null ? pred.home : '';
  const av     = pred.away !== null ? pred.away : '';

  const dateMeta = m.dt ? `<div class="match-meta"><div class="match-date">📅 ${fmtDate(m.dt)}</div></div>` : '';

  // If result known: show side-by-side comparison
  if (actual && actual.home !== null && actual.away !== null) {
    const { pts, breakdown } = scoreMatch(pred, actual);
    let rowClass = 'match-done';
    let pill = '';
    if (!breakdown) {
      pill = `<span class="result-pill miss">sin pronóstico</span>`;
    } else if (breakdown === 'exact') {
      rowClass += ' match-exact';
      pill = `<span class="result-pill exact">⭐ +5</span>`;
    } else if (pts > 0) {
      rowClass += ' match-partial';
      const labels = breakdown.map(b => ({ winner:'ganador', homeGoals:'goles local', awayGoals:'goles visit.' }[b] || b));
      pill = `<span class="result-pill partial">+${pts} · ${labels.join(' + ')}</span>`;
    } else {
      rowClass += ' match-miss';
      pill = `<span class="result-pill miss">0 pts</span>`;
    }
    const predH = pred.home !== null ? pred.home : '–';
    const predA = pred.away !== null ? pred.away : '–';
    return `<div class="${rowClass}">
      ${dateMeta}
      <div class="match-done-inner">
        ${teamHTML(m.home)}
        <div class="match-done-center">
          <div class="scores-wrap">
            <div class="score-col">
              <div class="score-col-label">Pronóstico</div>
              <div class="score-col-value pred-value">${predH}<span class="score-col-sep">:</span>${predA}</div>
            </div>
            <div class="score-col-divider"></div>
            <div class="score-col">
              <div class="score-col-label">Resultado</div>
              <div class="score-col-value real-value">${actual.home}<span class="score-col-sep">:</span>${actual.away}</div>
            </div>
          </div>
          ${pill}
        </div>
        ${teamHTML(m.away, 'right')}
      </div>
    </div>`;
  }

  // No result: show editable inputs
  return `<div class="match">
    ${dateMeta}
    ${teamHTML(m.home)}
    <div class="score-box">
      <div class="score-inputs">
        <input class="score-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-pred="${m.id}" data-side="home" ${locked ? 'disabled' : ''}>
        <span class="score-sep">:</span>
        <input class="score-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-pred="${m.id}" data-side="away" ${locked ? 'disabled' : ''}>
      </div>
    </div>
    ${teamHTML(m.away, 'right')}
  </div>`;
}

// ——— ADD PLAYER MODAL ———
function simulateGroup(groupName, predictions) {
  const ph = state.phases.find(p => p.id === 'grupos');
  if (!ph) return [];
  const matches = ph.matches.filter(m => m.group === groupName);

  // Get all teams in this group
  const teamsSet = new Set();
  matches.forEach(m => { teamsSet.add(m.home); teamsSet.add(m.away); });
  const teams = [...teamsSet];

  // Init standings
  const standings = Object.fromEntries(teams.map(t => ([t, {
    team: t, pts: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, played: 0
  }])));

  for (const m of matches) {
    // Use prediction if available, otherwise actual result
    const pred = predictions[m.id];
    const actual = m.result;
    const score = actual?.home != null ? actual : (pred?.home != null ? pred : null);
    if (!score) continue;

    const h = score.home, a = score.away;
    const sH = standings[m.home], sA = standings[m.away];
    if (!sH || !sA) continue;

    sH.played++; sA.played++;
    sH.gf += h; sH.ga += a; sH.gd += h - a;
    sA.gf += a; sA.ga += h; sA.gd += a - h;

    if (h > a)       { sH.pts += 3; sH.w++; sA.l++; }
    else if (h < a)  { sA.pts += 3; sA.w++; sH.l++; }
    else             { sH.pts += 1; sA.pts += 1; sH.d++; sA.d++; }
  }

  return Object.values(standings).sort((a, b) =>
    b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team)
  );
}

function renderGroupTableModal() {
  if (!groupTableFor) return '';

  const predictions = player?.predictions || {};
  const rows = simulateGroup(groupTableFor, predictions);

  const groupMatches = ph.matches.filter(m => m.group === groupTableFor);
  const withPred = groupMatches.filter(m => {

  const withResult = groupMatches.filter(m => m.result?.home != null).length;

  const tableRows = rows.map((s, i) => {
    // Top 2 qualify directly, pos 3 might qualify as best 3rd

    const gdClass = s.gd > 0 ? 'pos' : s.gd < 0 ? 'neg' : 'zero';

    return `<tr>

function getAllMatches() {
  // Returns all matches across all phases, sorted by date
  return state.phases.flatMap(ph =>
    ph.matches.map(m => ({ ...m, phaseId: ph.id, phaseLabel: ph.label }))
  ).filter(m => m.dt).sort((a, b) => a.dt.localeCompare(b.dt));
}

function matchDayKey(dtStr) {
  // Returns 'YYYY-MM-DD' from dt string 'YYYY-MM-DDTHH:MM'
  return dtStr.slice(0, 10);
}

function todayKey() {
  // Today in Argentina time (UTC-3)
  const now = new Date();
  now.setHours(now.getHours() - 3);
  const yyyy = now.getUTCFullYear();
  const mm   = String(now.getUTCMonth() + 1).padStart(2, '0');
  const dd   = String(now.getUTCDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function renderCalendar() {
  const all      = getAllMatches();
  const days     = [...new Set(all.map(m => matchDayKey(m.dt)))].sort();
  const today    = todayKey();

  // Init calendarDate to today or first match day
  if (!calendarDate || !days.includes(calendarDate)) {
    calendarDate = days.find(d => d >= today) || days[days.length - 1] || today;
  }

  const matchesOnDay = all.filter(m => matchDayKey(m.dt) === calendarDate);

  // Group by phase for the section labels
  const byPhase = {};
  for (const m of matchesOnDay) {
    if (!byPhase[m.phaseLabel]) byPhase[m.phaseLabel] = [];
    byPhase[m.phaseLabel].push(m);
  }

  // Build date pills
  const dias  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const pills = days.map(d => {
    const dt       = new Date(d + 'T12:00:00-03:00');
    const dayName  = dias[dt.getDay()];
    const dayNum   = dt.getDate();
    const monName  = meses[dt.getMonth()];
    const isActive = d === calendarDate;
    const isToday  = d === today;
    const hasMat   = all.some(m => matchDayKey(m.dt) === d);
    return `<button class="cal-pill${isActive ? ' active' : ''}${isToday ? ' today' : ''}${hasMat ? ' has-matches' : ''}"
      data-calday="${d}" id="cal-pill-${d}">
      <span class="cal-pill-day">${dayName}</span>
      <span class="cal-pill-num">${dayNum}</span>
      <span class="cal-pill-mon">${monName}</span>
      <span class="cal-dot"></span>
    </button>`;
  }).join('');

  // Build match cards grouped by phase
  let cardsHTML = '';
  if (matchesOnDay.length === 0) {
    cardsHTML = `<div class="cal-empty">No hay partidos este día</div>`;
  } else {
    for (const [phLabel, matches] of Object.entries(byPhase)) {
      cardsHTML += `<div class="cal-section-label">${phLabel}</div>`;
      cardsHTML += `<div class="cal-grid">${matches.map(m => renderCalCard(m)).join('')}</div>`;
    }
  }

  return renderHeader('Calendario de partidos') + renderNav() + `
    <div class="cal-dates-wrap">
      <div class="cal-dates" id="cal-dates-scroll">${pills}</div>
    </div>
    ${cardsHTML}`;
}

function renderCalCard(m) {
  const hasResult = m.result?.home != null && m.result?.away != null;
  const timeStr   = m.dt ? m.dt.slice(11, 16) + ' hs' : '';
  const phBadge   = `<span class="phase-lbl">${m.group || m.phaseLabel}</span>`;

  const scoreHTML = hasResult
    ? `<div class="cal-score-nums finished">${m.result.home}<span class="cal-score-sep">:</span>${m.result.away}</div>`
    : `<div class="cal-score-time">${timeStr}</div>`;

  return `<div class="cal-card${hasResult ? ' finished' : ''}" data-action="openCalMatch" data-mid="${m.id}">
    <div class="cal-card-time">${phBadge}${hasResult ? '<span style="color:var(--green);font-weight:800;font-size:10px">✓ FINAL</span>' : timeStr}</div>
    <div class="cal-card-teams">
      <div class="cal-team">
        ${flagHTML(m.home)}
        <span class="cal-team-name">${esc(m.home)}</span>
      </div>
      <div class="cal-score">${scoreHTML}</div>

function readPin(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return '';
  return Array.from(container.querySelectorAll('.pin-digit')).map(d => d.value || '').join('');
}

// ============================================================
// EVENT BINDING
// ============================================================
function bindEvents() {
  // Nav buttons
  document.querySelectorAll('[data-go]').forEach(el =>
    el.addEventListener('click', () => { view = el.dataset.go; render(); })
  );

  // Phase tabs
  document.querySelectorAll('[data-phase]').forEach(el =>
    el.addEventListener('click', () => {
      const action = () => { dirtyPreds = false; currentPhase = el.dataset.phase; currentGroup = null; render(); };
      if (dirtyPreds) { pendingAction = action; modalOpen = 'unsaved'; render(); }
      else action();
    })
  );

  // Group letter tabs
  document.querySelectorAll('[data-groupsel]').forEach(el =>
    el.addEventListener('click', () => {
      const grp = el.dataset.groupsel;
      if (grp === currentGroup) return;
      const action = () => { dirtyPreds = false; currentGroup = grp; render(); };
      if (dirtyPreds) { pendingAction = action; modalOpen = 'unsaved'; render(); }
      else action();
    })
  );

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(el =>
    el.addEventListener('click', handleAction)
  );

  // Prediction inputs
  document.querySelectorAll('[data-pred]').forEach(input => {
    input.addEventListener('change', () => {
      const val = input.value === '' ? null : parseInt(input.value);
      const player = state.players.find(p => p.id === currentPlayer);
      if (!player) return;
      if (!player.predictions[input.dataset.pred]) player.predictions[input.dataset.pred] = { home: null, away: null };
      player.predictions[input.dataset.pred][input.dataset.side] = val;
      // Mark dirty without re-rendering the whole page — just update button UI
      if (!dirtyPreds) {
        dirtyPreds = true;
        const btn = document.getElementById('save-preds-btn');
        if (btn) { btn.classList.add('dirty'); btn.textContent = '💾 Grabar cambios'; }
      }
    });
  });

  // PIN digit navigation
  document.querySelectorAll('.pin-digit').forEach((input, i, all) => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace') {
        if (input.value) { input.value = ''; }
        else if (i > 0) { all[i - 1].value = ''; all[i - 1].focus(); }
        e.preventDefault();
      }
      if (e.key === 'Enter') {
        const inPlayer = !!document.getElementById('pin-player');
        if (inPlayer) confirmPin();
      }
    });
    input.addEventListener('input', () => {
      const v = input.value.replace(/\D/g, '');
      input.value = v ? v.slice(-1) : '';
      if (input.value && i < all.length - 1) all[i + 1].focus();
    });
    input.addEventListener('focus', () => input.select());
  });

  // Admin PIN field enter
  document.getElementById('admin-pin-field')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doAdminLogin();
  });

  // Calendar day pills
  document.querySelectorAll('[data-calday]').forEach(el =>
    el.addEventListener('click', () => { calendarDate = el.dataset.calday; render(); })
  );

  // Auto-scroll calendar to active pill
  const activePill = document.getElementById(`cal-pill-${calendarDate}`);
  if (activePill) {
    setTimeout(() => activePill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 50);
  }

  // Close calendar match modal on outside click
  document.getElementById('overlay-cal-match')?.addEventListener('click', e => {
    if (e.target.id === 'overlay-cal-match') { modalOpen = null; calendarMatch = null; render(); }
  });

  // Close overlay on outside click
  document.getElementById('overlay')?.addEventListener('click', e => {
    if (e.target.id === 'overlay-unsaved') { modalOpen = null; pendingAction = null; render(); }
  });
  document.getElementById('overlay-scoring')?.addEventListener('click', e => {
    if (e.target.id === 'overlay-scoring') { modalOpen = null; render(); }
  });
  document.getElementById('overlay-group-table')?.addEventListener('click', e => {
    if (e.target.id === 'overlay-group-table') { modalOpen = null; groupTableFor = null; render(); }
  });
}

// ============================================================
// ACTION HANDLERS
// ============================================================
function handleAction() {
  const a = this.dataset.action;

  // ---- NAVIGATION ----
  if (a === 'goHome') {
    const action = () => { dirtyPreds = false; view = 'home'; currentPlayer = null; render(); };
    if (dirtyPreds) { pendingAction = action; modalOpen = 'unsaved'; render(); }
    else action();
  }
  else if (a === 'savePredictions') { savePredictions(); }
  else if (a === 'openScoringInfo') { modalOpen = 'scoringInfo'; render(); }
  else if (a === 'openCalMatch') {
    calendarMatch = this.dataset.mid;
    modalOpen = 'calendarMatch';
    render();
  }
  else if (a === 'closeCalMatch') { modalOpen = null; calendarMatch = null; render(); }
  else if (a === 'unsavedSaveAndContinue') {
    savePredictions().then(() => { if (pendingAction) { pendingAction(); pendingAction = null; } });
  }
  else if (a === 'unsavedDiscardAndContinue') {
    modalOpen = null; dirtyPreds = false;
    if (pendingAction) { pendingAction(); pendingAction = null; }
  }
  else if (a === 'unsavedCancel') {
    modalOpen = null; pendingAction = null; render();
  }
  else if (a === 'openGroupTable') { groupTableFor = this.dataset.group; modalOpen = 'groupTable'; render(); }
  else if (a === 'closeGroupTable') { modalOpen = null; groupTableFor = null; render(); }
  else if (a === 'closeModal')   { modalOpen = null; currentPlayer = null; pinError = ''; render(); }

  // ---- PLAYER PIN ----
  else if (a === 'openPlayerPin') {
    currentPlayer = this.dataset.pid;
    currentGroup  = null; // will auto-select first incomplete group
    pinError = '';
    modalOpen = 'playerPin';
    render();
    setTimeout(() => document.querySelector('#pin-player .pin-digit')?.focus(), 30);
  }
  else if (a === 'confirmPin')   { confirmPin(); }

  // ---- ADMIN ----
  else if (a === 'openAddPlayer') {
    modalOpen = 'addPlayer';
    render();
    setTimeout(() => document.getElementById('new-player-name')?.focus(), 30);
  }
  else if (a === 'confirmAddPlayer') { confirmAddPlayer(); }
  else if (a === 'doAdminLogin') { doAdminLogin(); }
  else if (a === 'saveResults')  { adminSaveResults(); }
  else if (a === 'resetResults') { adminResetResults(); }
  else if (a === 'lockPhase')    { adminSetPhaseLock(true); }
  else if (a === 'unlockPhase')  { adminSetPhaseLock(false); }
  else if (a === 'deletePlayer') { adminDeletePlayer(this.dataset.pid); }
  else if (a === 'changePin')    { adminChangePin(this.dataset.pid); }
  else if (a === 'saveAdminPin') { adminSavePin(); }
  else if (a === 'fetchResults') { adminFetchResults(); }
}

// ============================================================
// ACTION IMPLEMENTATIONS
// ============================================================

function confirmPin() {
  const player = state.players.find(p => p.id === currentPlayer);
  if (!player) return;
  const entered = readPin('pin-player');
  if (entered.length < 4) { pinError = 'Completá los 4 dígitos'; render(); setTimeout(() => document.querySelector('#pin-player .pin-digit')?.focus(), 30); return; }
  if (entered === String(player.pin)) {
    modalOpen = null; pinError = ''; view = 'player'; render();
  } else {
    pinError = 'PIN incorrecto. Intentá de nuevo.';
    render();
    setTimeout(() => {
      document.querySelectorAll('#pin-player .pin-digit').forEach(d => { d.classList.add('shake'); d.value = ''; });
      setTimeout(() => { document.querySelectorAll('#pin-player .pin-digit').forEach(d => d.classList.remove('shake')); document.querySelector('#pin-player .pin-digit')?.focus(); }, 400);
    }, 30);
  }
}

async function confirmAddPlayer() {
  const name = document.getElementById('new-player-name')?.value.trim();
  if (!name) { alert('Ingresá un nombre.'); return; }
  if (state.players.find(p => p.name.toLowerCase() === name.toLowerCase())) { alert('Ya existe ese nombre.'); return; }
  const pin = readPin('pin-admin');
  if (pin.length < 4) { alert('Asigná un PIN de 4 dígitos.'); return; }
  const player = { id: 'p' + Date.now(), name, pin, predictions: {} };
  state.players.push(player);
  modalOpen = null;
  render();
  await DB.upsertPlayer(player);
}

function doAdminLogin() {
  const f = document.getElementById('admin-pin-field');
  if (f && f.value === state.adminPin) { adminAuthed = true; render(); }
  else alert('PIN incorrecto.');
}

async function savePredictions() {
  if (!dirtyPreds) return;
  const btn = document.getElementById('save-preds-btn');
  if (btn) { btn.textContent = '⏳ Grabando...'; btn.disabled = true; btn.classList.add('dirty'); }
  syncStatus('saving', 'Guardando pronósticos...');

  const player = state.players.find(p => p.id === currentPlayer);
  if (!player) return;

  // Upsert all predictions that have both home and away filled
  const toSave = Object.entries(player.predictions)
    .filter(([, pred]) => pred.home !== null && pred.away !== null);

  try {
    // Batch upsert in one call
    if (toSave.length > 0) {
      const rows = toSave.map(([match_id, pred]) => ({
        player_id: currentPlayer,
        match_id,
        home_goals: pred.home,
        away_goals: pred.away,
      }));
      await DB._fetch('prode_predictions', {
        method: 'POST',
        headers: DB._h({ Prefer: 'resolution=merge-duplicates,return=minimal' }),
        body: JSON.stringify(rows),
      });
    }
    dirtyPreds = false;
    syncStatus('ok', `${toSave.length} pronósticos guardados ✓`);
    // Update button UI without full re-render
    if (btn) {
      btn.textContent = '✅ Guardado';
      btn.classList.remove('dirty');
      btn.disabled = false;
    }
    // Re-render group tabs to update completion indicators
    const ph = state.phases.find(p => p.id === currentPhase);
    if (ph?.hasGroups) {
      const tabEls = document.querySelectorAll('[data-groupsel]');
      tabEls.forEach(tab => {
        const grp = tab.dataset.groupsel;
        const preds = player.predictions;
        const ms = ph.matches.filter(m => m.group === grp);
        const filled = ms.filter(m => preds[m.id]?.home != null && preds[m.id]?.away != null).length;
        const status = filled === ms.length ? 'gtab-complete' : filled > 0 ? 'gtab-partial' : 'gtab-empty';
        tab.className = tab.className.replace(/gtab-\w+/, status);
      });
    }
  } catch (e) {
    syncStatus('error', 'Error al guardar');
    if (btn) { btn.textContent = '💾 Grabar cambios'; btn.disabled = false; }
  }
}

async function adminSaveResults() {
  const ph = state.phases.find(p => p.id === currentPhase);
  document.querySelectorAll('[data-amid]').forEach(input => {
    const m = ph.matches.find(x => x.id === input.dataset.amid);
    if (!m) return;
    const side = input.dataset.side;
    if (side === 'homeName') { if (input.value.trim()) m.home = input.value.trim(); }
    else if (side === 'awayName') { if (input.value.trim()) m.away = input.value.trim(); }
    else {
      const val = input.value === '' ? null : parseInt(input.value);
      if (!m.result) m.result = { home: null, away: null };
      m.result[side] = val;
    }
  });
  await DB.upsertResults(ph.matches);
  render();
  const btn = document.querySelector('[data-action="saveResults"]');
  if (btn) { const o = btn.textContent; btn.textContent = '✅ Guardado'; setTimeout(() => btn.textContent = o, 1500); }
}

async function adminResetResults() {
  if (!confirm('¿Limpiar resultados de esta fase?')) return;
  const ph = state.phases.find(p => p.id === currentPhase);
  ph.matches.forEach(m => m.result = null);
  await DB.deleteResults(ph.matches.map(m => m.id));
  render();
}

async function adminSetPhaseLock(locked) {
  const ph = state.phases.find(p => p.id === currentPhase);
  if (!ph) return;
  ph.locked = locked;
  render();
  await DB.upsertPhaseLock(currentPhase, locked);
}

async function adminDeletePlayer(pid) {
  if (!confirm('¿Eliminar este jugador?')) return;
  state.players = state.players.filter(p => p.id !== pid);
  render();
  await DB.deletePlayer(pid);
}

async function adminChangePin(pid) {
  const player = state.players.find(p => p.id === pid);
  if (!player) return;
  const newPin = prompt(`Nuevo PIN de 4 dígitos para ${player.name}:`);
  if (!newPin) return;
  if (!/^\d{4}$/.test(newPin)) { alert('El PIN debe ser 4 dígitos.'); return; }
  player.pin = newPin;
  render();
  await DB.updatePlayerPin(pid, newPin);
  alert(`✅ PIN de ${player.name} actualizado.`);
}

async function adminSavePin() {
  const f = document.getElementById('pin-admin-change');
  if (!f || !f.value.trim()) return;
  state.adminPin = f.value.trim();
  await DB.saveSetting('adminPin', state.adminPin);
  alert('PIN de admin actualizado.');
}

async function adminFetchResults() {
  const btn  = document.querySelector('[data-action="fetchResults"]');
  const info = document.getElementById('sync-info');
  if (btn) { btn.disabled = true; btn.textContent = 'Consultando...'; }
  syncStatus('saving', 'Consultando football-data.org...');

  try {
    const resp = await fetch(FD_PROXY(`${FD_BASE}/competitions/WC/matches`), {
      headers: { 'X-Auth-Token': FD_TOKEN },
    });
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const { matches } = await resp.json();
    const finished = matches.filter(m => m.status === 'FINISHED');
    const byId = Object.fromEntries(finished.map(m => [m.id, m]));

    const norm = s => (s || '').toLowerCase()
      .replace(/[áàäéèëíìïóòöúùüñç]/g, c => 'aaaeeeiiioooouuunc'['áàäéèëíìïóòöúùüñç'.indexOf(c)] || c)
      .replace(/\s+/g, ' ').trim();

    let changed = 0;
    for (const ph of state.phases) {
      for (const m of ph.matches) {
        if (m.result) continue;
        let apiM = m.fdId ? byId[m.fdId] : finished.find(a =>
          norm(a.homeTeam?.name) === norm(TEAM_EN[m.home] || m.home) &&
          norm(a.awayTeam?.name) === norm(TEAM_EN[m.away] || m.away)
        );
        if (apiM?.score?.fullTime) {
          const h = apiM.score.fullTime.home, a = apiM.score.fullTime.away;
          if (h !== null && a !== null) { m.result = { home: h, away: a }; changed++; }
        }
        // Update team names for KO matches
        if (m.fdId && byId[m.fdId]) {
          const apiMatch = byId[m.fdId];
          const toES = en => Object.entries(TEAM_EN).find(([,v]) => norm(v) === norm(en))?.[0] || en;
          const nh = toES(apiMatch.homeTeam?.name || ''), na = toES(apiMatch.awayTeam?.name || '');
          if (nh && !isPlaceholder(nh) && nh !== m.home) { m.home = nh; changed++; }
          if (na && !isPlaceholder(na) && na !== m.away) { m.away = na; changed++; }
        }
      }
    }

    const now = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    if (info) info.textContent = changed > 0
      ? `✅ ${changed} cambio${changed > 1 ? 's' : ''} a las ${now} · ${finished.length} finalizados en API`
      : `✅ Sin cambios a las ${now} · ${finished.length} finalizados en API`;

    if (changed > 0) {
      for (const ph of state.phases) await DB.upsertResults(ph.matches);
      render();
    }
    syncStatus('ok', changed > 0 ? 'Actualizado ✓' : 'Sin cambios');
  } catch (e) {
    if (info) info.textContent = '❌ Error al consultar la API';
    syncStatus('error', 'Error al consultar API');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '⚡ Actualizar resultados ahora'; }
  }
}

// ============================================================
// POLLING
// ============================================================
function startPolling() {
  setInterval(async () => {
    const ok = await loadFromCloud();
    if (ok) render();
  }, 15000);
}

// ============================================================
// INIT
// ============================================================
(async () => {
  render(); // render immediately with empty state
  const ok = await loadFromCloud();
  if (ok) render(); // re-render with real data
  syncStatus('ok', 'Conectado');
  startPolling();
})();
</script>
