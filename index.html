<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode FIFA World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8001D;--blue:#0033A0;--green:#00A651;--yellow:#FFD100;
  --purple:#6B21A8;--orange:#F97316;
  --dark:#0a0a0a;--dark2:#141414;--dark3:#1e1e1e;
  --light:#f5f5f5;--muted:#888;--border:#2a2a2a;
  --card:#1a1a1a;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--light);min-height:100vh;overflow-x:hidden}
.app{max-width:900px;margin:0 auto;padding:0 1rem 4rem}

/* ===== HEADER ===== */
.header{position:relative;overflow:hidden;padding:2rem 1rem 1.5rem;margin:0 -1rem 0;text-align:center}
.header-bg{position:absolute;inset:0;display:flex}
.header-bg span{flex:1}
.header-bg span:nth-child(1){background:var(--red)}
.header-bg span:nth-child(2){background:var(--blue)}
.header-bg span:nth-child(3){background:var(--green)}
.header-bg span:nth-child(4){background:var(--yellow)}
.header-overlay{position:absolute;inset:0;background:rgba(0,0,0,.72)}
.header-content{position:relative;z-index:1}
.header-year{font-family:'Barlow Condensed',sans-serif;font-size:clamp(80px,18vw,160px);font-weight:900;font-style:italic;line-height:.85;letter-spacing:-4px;background:linear-gradient(135deg,var(--yellow) 0%,#fff 40%,var(--yellow) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none;user-select:none}
.header-badge{display:inline-flex;align-items:center;gap:10px;background:var(--yellow);color:var(--dark);padding:6px 20px;border-radius:999px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem}
.header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:900;font-style:italic;color:#fff;text-transform:uppercase;letter-spacing:-1px;line-height:1;margin-bottom:.25rem}
.header h1 span{color:var(--yellow)}
.header p{font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.5px}
.header-stripe{height:5px;background:linear-gradient(90deg,var(--red),var(--blue),var(--green),var(--yellow),var(--red));margin:0 -1rem}

/* ===== NAV ===== */
.nav{display:flex;gap:4px;padding:1rem 0 .75rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none}
.nav-btn{flex-shrink:0;padding:8px 20px;border-radius:999px;border:1px solid var(--border);background:transparent;font-size:13px;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.nav-btn:hover{color:var(--light);border-color:#444}
.nav-btn.active{background:var(--yellow);color:var(--dark);border-color:var(--yellow)}

/* ===== SECTION ===== */
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;color:#fff}
.section-title .accent{width:4px;height:22px;border-radius:2px;flex-shrink:0}
.badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.badge-muted{background:var(--dark3);color:var(--muted);border:1px solid var(--border)}
.badge-yellow{background:var(--yellow);color:var(--dark)}
.badge-red{background:var(--red);color:#fff}
.badge-green{background:var(--green);color:#fff}

/* ===== PHASE TABS ===== */
.phase-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:1.25rem;padding-bottom:4px;scrollbar-width:none}
.phase-tab{flex-shrink:0;padding:7px 18px;border-radius:999px;border:1px solid var(--border);background:var(--dark3);font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.phase-tab:hover{border-color:#555;color:var(--light)}
.phase-tab.active{background:var(--yellow);color:var(--dark);border-color:var(--yellow)}
.phase-tab.locked{opacity:.5}

/* ===== PLAYERS ===== */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.player-card{background:var(--dark3);border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;transition:all .2s;overflow:hidden;position:relative}
.player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow);transform:scaleX(0);transition:transform .2s;transform-origin:left}
.player-card:hover::before{transform:scaleX(1)}
.player-card:hover{border-color:#444;transform:translateY(-2px)}
.player-card-inner{padding:1rem .75rem}
.player-avatar{width:50px;height:50px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;position:relative}
.player-avatar::after{content:'';position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;background:linear-gradient(var(--dark3),var(--dark3)) padding-box,linear-gradient(135deg,var(--yellow),transparent) border-box}
.player-card-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.3px}
.player-card-pts{font-size:11px;color:var(--yellow);margin-top:3px;font-weight:600;letter-spacing:.5px}
.player-add-card{border-style:dashed;background:transparent;cursor:pointer}
.player-add-card:hover{border-color:var(--yellow)}
.player-add-card .player-avatar{background:transparent;border:2px dashed var(--border)}
.player-add-card .player-avatar::after{display:none}

/* ===== GROUP LABEL ===== */
.group-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:12px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.group-label:not(:first-child){margin-top:12px}
.group-label .dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);flex-shrink:0}

/* ===== MATCH ROW ===== */
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)}
.match:last-child{border-bottom:none}
.match-meta{grid-column:1/-1;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.match-date{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.match-date .flag-sm{font-size:12px}
.team{display:flex;align-items:center;gap:8px}
.team.right{flex-direction:row-reverse;text-align:right}
.team-flag{font-size:26px;flex-shrink:0;line-height:1}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.3px;line-height:1.2}
.score-box{display:flex;align-items:center;justify-content:center;gap:4px;flex-direction:column}
.score-inputs{display:flex;align-items:center;gap:4px}
.score-input{width:36px;height:36px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:17px;font-weight:800;background:var(--dark2);color:#fff;-moz-appearance:textfield;font-family:'Barlow Condensed',sans-serif;transition:border .15s}
.score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button{-webkit-appearance:none}
.score-input:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,209,0,.15)}
.score-input:disabled{opacity:.35;cursor:not-allowed}
.score-sep{font-family:'Barlow Condensed',sans-serif;font-size:22px;color:var(--muted);font-weight:800;line-height:1}
.result-pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;text-transform:uppercase}
.result-pill.exact{background:var(--green);color:#fff}
.result-pill.partial{background:var(--yellow);color:var(--dark)}
.result-pill.miss{background:var(--red);color:#fff}
.actual-score{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;font-family:'Barlow Condensed',sans-serif}

/* ===== LEADERBOARD ===== */
.lb-header{display:grid;grid-template-columns:36px 1fr 52px 52px 52px;gap:8px;padding:4px 14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.lb-row{display:grid;grid-template-columns:36px 1fr 52px 52px 52px;align-items:center;gap:8px;padding:12px 14px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:4px;position:relative;overflow:hidden;transition:transform .15s}
.lb-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.lb-row.pos1{background:rgba(255,209,0,.12);border:1px solid rgba(255,209,0,.3)}
.lb-row.pos1::before{background:var(--yellow)}
.lb-row.pos2{background:rgba(192,192,192,.08);border:1px solid rgba(192,192,192,.2)}
.lb-row.pos2::before{background:#c0c0c0}
.lb-row.pos3{background:rgba(205,127,50,.08);border:1px solid rgba(205,127,50,.2)}
.lb-row.pos3::before{background:#cd7f32}
.lb-row.other{background:var(--dark3);border:1px solid var(--border)}
.lb-pos{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-align:center}
.lb-row.pos1 .lb-pos{color:var(--yellow)}
.lb-row.pos2 .lb-pos{color:#c0c0c0}
.lb-row.pos3 .lb-pos{color:#cd7f32}
.lb-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;text-transform:uppercase;display:flex;align-items:center;gap:10px;color:#fff}
.lb-mini-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;flex-shrink:0}
.lb-pts{text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--yellow)}
.lb-detail{text-align:center;font-size:13px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600}
.scoring-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.scoring-card{padding:14px;background:var(--dark3);border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center}
.scoring-card .val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;font-style:italic;color:var(--yellow);line-height:1}
.scoring-card .lbl{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;font-weight:600;letter-spacing:.3px}

/* ===== ADMIN ===== */
.admin-match{display:grid;grid-template-columns:1fr 52px 52px 1fr;align-items:center;gap:6px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.admin-match:last-child{border-bottom:none}
.admin-input{width:50px;height:32px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:15px;font-weight:800;background:var(--dark2);color:#fff;-moz-appearance:textfield;font-family:'Barlow Condensed',sans-serif}
.admin-input::-webkit-outer-spin-button,.admin-input::-webkit-inner-spin-button{-webkit-appearance:none}
.admin-input:focus{outline:none;border-color:var(--yellow)}
.admin-team{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.admin-team.right{text-align:right}
.knockout-row{display:grid;grid-template-columns:1fr 44px 44px 1fr;align-items:center;gap:6px;padding:10px 0;border-bottom:1px solid var(--border)}
.knockout-row:last-child{border-bottom:none}

/* ===== FORMS ===== */
.btn{padding:10px 22px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--dark3);color:#fff;font-size:14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.btn:hover{border-color:#555;background:var(--dark2)}
.btn.primary{background:var(--yellow);color:var(--dark);border-color:var(--yellow)}
.btn.primary:hover{background:#e6bc00}
.btn.danger{background:rgba(232,0,29,.15);color:var(--red);border-color:rgba(232,0,29,.4)}
.btn.sm{padding:5px 14px;font-size:12px}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem}
.input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--dark2);color:#fff;font-size:14px;font-family:'Barlow',sans-serif;transition:border .15s}
.input:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,209,0,.1)}
.label{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);margin-bottom:5px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;width:fit-content;padding:6px 10px;border-radius:var(--radius-sm);transition:all .15s}
.back-row:hover{color:var(--light);background:var(--dark3)}

/* ===== PLAYER HEADER ===== */
.player-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;padding:1.25rem;background:var(--dark3);border-radius:var(--radius);border:1px solid var(--border);border-left:4px solid var(--yellow)}
.player-header-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-.5px}
.player-header-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.3px}
.phase-locked-msg{padding:12px 16px;background:rgba(232,0,29,.1);border:1px solid rgba(232,0,29,.3);border-radius:var(--radius-sm);font-size:13px;color:#ff6b7a;margin-bottom:1rem;font-weight:600;display:flex;align-items:center;gap:8px}

/* ===== MODAL ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:var(--radius);padding:1.75rem;width:100%;max-width:380px;border:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.6)}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1.25rem;color:#fff}

/* ===== SYNC ===== */
.sync-bar{position:fixed;bottom:1rem;right:1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:100;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .3s}
.sync-bar.saving{color:var(--yellow);border-color:rgba(255,209,0,.4)}
.sync-bar.error{color:var(--red);border-color:rgba(232,0,29,.4)}
.sync-bar.ok{color:var(--green);border-color:rgba(0,166,81,.4)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ===== MISC ===== */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tip{font-size:12px;color:var(--muted);margin-top:.5rem;line-height:1.5;font-weight:500}

@media(max-width:600px){
  .match{grid-template-columns:1fr auto 1fr}
  .team-name{font-size:13px}
  .team-flag{font-size:22px}
  .players-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
  .lb-row,.lb-header{grid-template-columns:28px 1fr 44px 44px 44px}
  .score-input{width:32px;height:32px;font-size:15px}
  .admin-match{grid-template-columns:1fr 44px 44px 1fr}
}
</style>
</head>

function syncStatus(type,msg){

async function loadFromCloud(){
  try{
    const resp=await fetch(API_BASE+'/latest',{headers:{'X-Master-Key':MASTER_KEY}});
    const data=await resp.json();
    if(data.record){
      const rec=data.record;
      if(rec.players)state.players=rec.players;
      if(rec.adminPin)state.adminPin=rec.adminPin;
      if(rec.phases&&rec.phases.length>0)state.phases=rec.phases;
      return true;
    }
  }catch(e){syncStatus('error','Sin conexión');}
  return false;
}

async function saveToCloud(){
  syncStatus('saving','Guardando...');
  try{
    const resp=await fetch(API_BASE,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},body:JSON.stringify(state)});
    if(resp.ok)syncStatus('ok','Guardado ✓');
    else syncStatus('error','Error');
  }catch(e){syncStatus('error','Sin conexión');}
}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(saveToCloud,800);}
function startPolling(){setInterval(async()=>{const u=await loadFromCloud();if(u)render();},12000);}

function getPhase(id){return state.phases.find(p=>p.id===id);}
function getAllResults(){const r={};for(const ph of state.phases)for(const m of ph.matches)if(m.result)r[m.id]=m.result;return r;}
function calcPts(preds,results){
  let pts=0,exact=0,part=0;
  for(const[mid,actual]of Object.entries(results)){
    if(!actual||actual.home===null||actual.away===null)continue;
    const p=preds[mid];
    if(!p||p.home===null||p.away===null)continue;
    if(p.home===actual.home&&p.away===actual.away){pts+=3;exact++;}
    else if(Math.sign(p.home-p.away)===Math.sign(actual.home-actual.away)){pts+=1;part++;}
  }
  return{pts,exact,part};
}
function getLeaderboard(){
  const results=getAllResults();
  return state.players.map(p=>{
    const{pts,exact,part}=calcPts(p.predictions||{},results);
    return{...p,pts,exact,part};
  }).sort((a,b)=>b.pts-a.pts||(b.exact-a.exact)||(b.part-a.part));
}
const AVATAR_COLORS=['#E8001D','#0033A0','#00A651','#FFD100','#F97316','#6B21A8','#0891B2','#BE185D','#059669','#7C3AED'];
function avatarColor(name){let h=0;for(const c of name)h+=c.charCodeAt(0);return AVATAR_COLORS[h%AVATAR_COLORS.length];}
function initials(name){return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function flag(team){const m=team.match(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u);return m?m[0]:'🏳️';}
function cleanName(team){return team.replace(/\s*(\p{Emoji_Presentation}|\p{Extended_Pictographic})+\s*/gu,' ').trim();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function formatDate(dtStr){
  if(!dtStr)return'';
  const d=new Date(dtStr+':00-03:00');
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dia=dias[d.getDay()];
  const fecha=d.getDate();
  const mes=meses[d.getMonth()];
  const h=String(d.getHours()).padStart(2,'0');
  const min=String(d.getMinutes()).padStart(2,'0');
  return`${dia} ${fecha} ${mes} · ${h}:${min} hs`;
}

function renderMatchRow(m,preds,locked,allResults){
  const pred=preds[m.id]||{home:null,away:null};
  const actual=allResults[m.id];
  const hv=pred.home!==null?pred.home:'';
  const av=pred.away!==null?pred.away:'';
  const dis=locked?'disabled':'';
  let pill='',actualStr='';
  if(actual&&actual.home!==null&&actual.away!==null){
    actualStr=`<div class="actual-score">Real: ${actual.home}–${actual.away}</div>`;
    if(pred.home!==null&&pred.away!==null){
      if(pred.home===actual.home&&pred.away===actual.away)pill='<span class="result-pill exact">+3 pts</span>';
      else if(Math.sign(pred.home-pred.away)===Math.sign(actual.home-actual.away))pill='<span class="result-pill partial">+1 pt</span>';
      else pill='<span class="result-pill miss">0 pts</span>';
    }
  }
  const dateStr=m.dt?`<div class="match-meta"><div class="match-date">📅 ${formatDate(m.dt)}</div></div>`:'';
  return`<div class="match">
    ${dateStr}
    <div class="team"><span class="team-flag">${flag(m.home)}</span><span class="team-name">${cleanName(m.home)}</span></div>
    <div class="score-box">
      <div class="score-inputs">
        <input class="score-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-pred="${m.id}" data-side="home" ${dis}>
        <span class="score-sep">:</span>
        <input class="score-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-pred="${m.id}" data-side="away" ${dis}>
      </div>
      ${actualStr}${pill}
    </div>
    <div class="team right"><span class="team-flag">${flag(m.away)}</span><span class="team-name">${cleanName(m.away)}</span></div>
  </div>`;
}

    <div style="display:flex;gap:8px">
      <input class="input" id="pin-change" type="text" maxlength="8" value="${esc(state.adminPin)}" style="max-width:160px">
      <button class="btn primary" data-action="savePin">Guardar</button>
    </div>
  </div>`;
}

function renderAdminMatchRow(m){
  const r=m.result||{};
  const hv=r.home!=null?r.home:'';
  const av=r.away!=null?r.away:'';
  return`<div class="admin-match">
    <span class="admin-team">${flag(m.home)} ${cleanName(m.home)}</span>
    <input class="admin-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-amid="${m.id}" data-side="home">
    <input class="admin-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-amid="${m.id}" data-side="away">
    <span class="admin-team right">${cleanName(m.away)} ${flag(m.away)}</span>
  </div>`;
}
function renderKOAdminRow(m){
  const r=m.result||{};
  const hv=r.home!=null?r.home:'';
  const av=r.away!=null?r.away:'';
  return`<div class="knockout-row">
    <input class="input" type="text" placeholder="Equipo local" value="${esc(m.home==='Por definir'?'':m.home)}" data-amid="${m.id}" data-side="homeName" style="font-size:13px;padding:7px 10px">
    <input class="admin-input" type="number" min="0" max="20" value="${hv}" placeholder="–" data-amid="${m.id}" data-side="home">
    <input class="admin-input" type="number" min="0" max="20" value="${av}" placeholder="–" data-amid="${m.id}" data-side="away">
    <input class="input" type="text" placeholder="Equipo visitante" value="${esc(m.away==='Por definir'?'':m.away)}" data-amid="${m.id}" data-side="awayName" style="font-size:13px;padding:7px 10px">
  </div>`;
}
function renderAdminLogin(){
  return renderHeader('Administración')+renderNav()+
  `<div class="section" style="max-width:340px;margin:0 auto">
    <div class="section-title"><span class="accent" style="background:var(--yellow)"></span>Ingresar como admin</div>
    <label class="label">PIN</label>
    <input class="input" id="admin-pin-field" type="password" placeholder="••••" maxlength="8" style="margin-bottom:1rem">
    <button class="btn primary" style="width:100%" data-action="doAdminLogin">Ingresar</button>
    <p class="tip" style="margin-top:.75rem">PIN por defecto: 1234</p>
  </div>`;
}
function renderAddPlayerModal(){
  return`<div class="overlay" id="overlay">
    <div class="modal">
      <h2>Agregar jugador</h2>
      <label class="label">Nombre o apodo</label>
      <input class="input" id="new-player-name" type="text" placeholder="Ej: Mamá, El Tío, Juan..." maxlength="30" style="margin-bottom:1rem" autofocus>
      <div class="btn-row" style="margin-top:0">
        <button class="btn primary" data-action="confirmAddPlayer">Agregar</button>
        <button class="btn" data-action="closeModal">Cancelar</button>
      </div>
    </div>
  </div>`;
}

// ============================================================
//  EVENTS
// ============================================================
function bindEvents(){
  document.querySelectorAll('[data-go]').forEach(el=>el.addEventListener('click',()=>{view=el.dataset.go;render();}));
  document.querySelectorAll('[data-phase]').forEach(el=>el.addEventListener('click',()=>{currentPhase=el.dataset.phase;render();}));
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',handleAction));
  document.querySelectorAll('[data-pred]').forEach(input=>{
    input.addEventListener('change',()=>{
      const player=state.players.find(p=>p.id===currentPlayer);
      if(!player)return;
      if(!player.predictions)player.predictions={};
      const mid=input.dataset.pred,side=input.dataset.side;
      const val=input.value===''?null:parseInt(input.value);
      if(!player.predictions[mid])player.predictions[mid]={home:null,away:null};
      player.predictions[mid][side]=val;
      scheduleSave();
    });
  });
  const pf=document.getElementById('admin-pin-field');
  if(pf)pf.addEventListener('keydown',e=>{if(e.key==='Enter')doAdminLogin();});
  const nf=document.getElementById('new-player-name');
  if(nf)nf.addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddPlayer();});
  const ov=document.getElementById('overlay');
  if(ov)ov.addEventListener('click',e=>{if(e.target===ov){modalOpen=null;render();}});
}

function handleAction(){
  const action=this.dataset.action;
  if(action==='selectPlayer'){currentPlayer=this.dataset.pid;view='player';render();}
  else if(action==='openAddPlayer'){modalOpen='addPlayer';render();setTimeout(()=>{const f=document.getElementById('new-player-name');if(f)f.focus();},30);}
  else if(action==='closeModal'){modalOpen=null;render();}
  else if(action==='confirmAddPlayer'){confirmAddPlayer();}
  else if(action==='goHome'){view='home';render();}
  else if(action==='doAdminLogin'){doAdminLogin();}
  else if(action==='saveResults'){saveResults();}
  else if(action==='lockPhase'){setPhaseLock(true);}
  else if(action==='unlockPhase'){setPhaseLock(false);}
  else if(action==='deletePlayer'){deletePlayer(this.dataset.pid);}
  else if(action==='savePin'){savePin();}
  else if(action==='resetResults'){resetResults();}
}

function confirmAddPlayer(){
  const inp=document.getElementById('new-player-name');
  const name=(inp?inp.value:'').trim();
  if(!name)return;
  if(state.players.find(p=>p.name.toLowerCase()===name.toLowerCase())){alert('Ya existe un jugador con ese nombre.');return;}
  state.players.push({id:'p'+Date.now(),name,predictions:{}});
  modalOpen=null;render();scheduleSave();
}
function doAdminLogin(){
  const f=document.getElementById('admin-pin-field');
  if(f&&f.value===state.adminPin){adminAuthed=true;render();}
  else alert('PIN incorrecto.');
}
function saveResults(){
  const ph=getPhase(currentPhase);
  document.querySelectorAll('[data-amid]').forEach(input=>{
    const mid=input.dataset.amid,side=input.dataset.side;
    const m=ph.matches.find(x=>x.id===mid);
    if(!m)return;
    if(side==='homeName'){if(input.value.trim())m.home=input.value.trim();}
    else if(side==='awayName'){if(input.value.trim())m.away=input.value.trim();}
    else{const val=input.value===''?null:parseInt(input.value);if(!m.result)m.result={home:null,away:null};m.result[side]=val;}
  });
  scheduleSave();
  const btn=document.querySelector('[data-action="saveResults"]');
  if(btn){const o=btn.textContent;btn.textContent='✅ Guardado';setTimeout(()=>{btn.textContent=o;},1500);}
}
function setPhaseLock(lock){const ph=getPhase(currentPhase);if(ph){ph.locked=lock;render();scheduleSave();}}
function deletePlayer(pid){
  if(!confirm('¿Eliminar este jugador?'))return;
  state.players=state.players.filter(p=>p.id!==pid);render();scheduleSave();
}
function savePin(){const f=document.getElementById('pin-change');if(f&&f.value.trim()){state.adminPin=f.value.trim();scheduleSave();alert('PIN actualizado.');}}
function resetResults(){
  if(!confirm('¿Limpiar resultados de esta fase?'))return;
  const ph=getPhase(currentPhase);ph.matches.forEach(m=>m.result=null);render();scheduleSave();
}

// ============================================================
//  INIT
// ============================================================
(async()=>{
  syncStatus('saving','Cargando...');
  await loadFromCloud();
  render();
  syncStatus('ok','Conectado');
  startPolling();
})();
</script>
